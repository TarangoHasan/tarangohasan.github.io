<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Random Password Generator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input, select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 14px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" style="color:var(--muted); text-decoration:none; font-size:14px; margin-bottom:10px; display:inline-block;">← Back to Home</a>
  <h1>Random Password Generator</h1>
  <p class="lead">Generate a secure, random password.</p>
  <label for="length">Length</label>
  <input type="number" id="length" value="12" min="4" max="128" />
  <div style="height:10px"></div>
  <label><input type="checkbox" id="uppercase" checked /> Uppercase</label>
  <label><input type="checkbox" id="lowercase" checked /> Lowercase</label>
  <label><input type="checkbox" id="numbers" checked /> Numbers</label>
  <label><input type="checkbox" id="symbols" checked /> Symbols</label>
  <div style="height:10px"></div>
  <button id="generateBtn">Generate Password</button>
  <div style="height:10px"></div>
  <div style="display:flex; gap:10px;">
    <input type="text" id="password" readonly />
    <button id="copyBtn" style="white-space:nowrap;">Copy</button>
  </div>
  <div id="errors" style="margin-top:8px; color: #ff4b2b;"></div>
</div>
<script>
const lengthEl = document.getElementById('length');
const uppercaseEl = document.getElementById('uppercase');
const lowercaseEl = document.getElementById('lowercase');
const numbersEl = document.getElementById('numbers');
const symbolsEl = document.getElementById('symbols');
const generateBtn = document.getElementById('generateBtn');
const passwordEl = document.getElementById('password');
const copyBtn = document.getElementById('copyBtn');
const errorsEl = document.getElementById('errors');

const upperLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lowerLetters = "abcdefghijklmnopqrstuvwxyz";
const numbers = "0123456789";
const symbols = "!@#$%^&*()_+=";

function generatePassword() {
  errorsEl.textContent = "";
  const len = parseInt(lengthEl.value);
  let chars = "";
  if (uppercaseEl.checked) chars += upperLetters;
  if (lowercaseEl.checked) chars += lowerLetters;
  if (numbersEl.checked) chars += numbers;
  if (symbolsEl.checked) chars += symbols;

  if (chars === "") {
    errorsEl.textContent = "Please select at least one character type.";
    passwordEl.value = "";
    return;
  }

  let password = "";
  const randomValues = new Uint32Array(len);
  crypto.getRandomValues(randomValues);

  for (let i = 0; i < len; i++) {
    password += chars.charAt(randomValues[i] % chars.length);
  }
  passwordEl.value = password;
}

generateBtn.addEventListener('click', generatePassword);

copyBtn.addEventListener('click', () => {
  if (passwordEl.value) {
    navigator.clipboard.writeText(passwordEl.value);
    const originalText = copyBtn.textContent;
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = originalText, 2000);
  }
});
</script>
</body>
</html>
