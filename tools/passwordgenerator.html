<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Random Password Generator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
* {
  box-sizing: border-box;
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
}
input[type="checkbox"] {
  width: auto;
  margin-right: 8px;
  cursor: pointer;
}
label.checkbox-label {
  display: flex;
  align-items: center;
  font-size: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  user-select: none;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 12px 20px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  transition: opacity 0.2s;
}
button:hover {
  opacity: 0.9;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}

/* Strength Meter */
.strength-container {
  margin-top: 15px;
  margin-bottom: 20px;
}
.strength-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}
.strength-text {
  font-weight: bold;
}
.strength-bar-bg {
  width: 100%;
  height: 8px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 4px;
  overflow: hidden;
}
.strength-bar-fill {
  height: 100%;
  width: 0%;
  transition: width 0.3s ease, background-color 0.3s ease;
}

/* Multi-password outputs */
.multi-output-container {
  margin-top: 15px;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 8px;
  padding: 15px;
  max-height: 250px;
  overflow-y: auto;
}
.multi-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.multi-item:last-child {
  border-bottom: none;
}
.multi-pw {
  font-family: monospace;
  font-size: 14px;
  word-break: break-all;
}
.item-copy-btn {
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--muted);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  margin-left: 10px;
}
.item-copy-btn:hover {
  background: var(--accent);
  color: #042027;
  border-color: var(--accent);
}

@media (max-width: 768px) {
  .flex-row {
    flex-direction: column !important;
    gap: 10px !important;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Random Password Generator</h1>
  <p class="lead">Generate highly secure passwords with precision options, multiple exports, and real-time strength analysis.</p>

  <div class="flex-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
    <div style="flex: 1;">
      <label for="length" style="display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px;">Password Length</label>
      <input type="number" id="length" value="12" min="4" max="128" />
    </div>
    <div style="flex: 1;">
      <label for="quantity" style="display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px;">Quantity</label>
      <input type="number" id="quantity" value="1" min="1" max="50" />
    </div>
  </div>

  <div style="margin-bottom: 15px;">
    <label class="checkbox-label">
      <input type="checkbox" id="uppercase" checked />
      <span>Include Uppercase Letters (A-Z)</span>
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="lowercase" checked />
      <span>Include Lowercase Letters (a-z)</span>
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="numbers" checked />
      <span>Include Numbers (0-9)</span>
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="symbols" checked />
      <span>Include Symbols (!@#$%^&amp;*()_+=)</span>
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="exclude-similar" />
      <span>Exclude Similar Characters (i, l, 1, L, o, 0, O)</span>
    </label>
  </div>

  <button id="generateBtn">Generate Password(s)</button>

  <!-- Single Password Panel -->
  <div id="single-pw-panel" style="margin-top: 20px;">
    <div class="strength-container">
      <div class="strength-label">
        <span>Password Strength</span>
        <span class="strength-text" id="strength-text">Weak</span>
      </div>
      <div class="strength-bar-bg">
        <div class="strength-bar-fill" id="strength-bar"></div>
      </div>
    </div>

    <div class="flex-row" style="display:flex; gap:10px;">
      <input type="text" id="password" readonly style="font-family: monospace; font-size: 16px;" />
      <button id="copyBtn" style="white-space:nowrap;">Copy</button>
    </div>
  </div>

  <!-- Multiple Password Panel -->
  <div id="multi-pw-panel" style="margin-top: 20px; display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <span style="font-size: 13px; color: var(--muted);">Generated Passwords</span>
      <button id="copyAllBtn" style="padding: 6px 12px; font-size: 12px;">Copy All</button>
    </div>
    <div class="multi-output-container" id="multi-output"></div>
  </div>

  <div id="errors" style="margin-top:8px; color: #ff4b2b;"></div>
</div>

<script>
const lengthEl = document.getElementById('length');
const quantityEl = document.getElementById('quantity');
const uppercaseEl = document.getElementById('uppercase');
const lowercaseEl = document.getElementById('lowercase');
const numbersEl = document.getElementById('numbers');
const symbolsEl = document.getElementById('symbols');
const excludeSimilarEl = document.getElementById('exclude-similar');

const generateBtn = document.getElementById('generateBtn');

const singlePwPanel = document.getElementById('single-pw-panel');
const passwordEl = document.getElementById('password');
const copyBtn = document.getElementById('copyBtn');
const strengthText = document.getElementById('strength-text');
const strengthBar = document.getElementById('strength-bar');

const multiPwPanel = document.getElementById('multi-pw-panel');
const multiOutput = document.getElementById('multi-output');
const copyAllBtn = document.getElementById('copyAllBtn');

const errorsEl = document.getElementById('errors');

const upperLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lowerLetters = "abcdefghijklmnopqrstuvwxyz";
const numbers = "0123456789";
const symbols = "!@#$%^&*()_+=";
const similarChars = /[il1Lo0O]/g;

function analyzeStrength(pwd) {
  if (!pwd) {
    strengthText.textContent = "None";
    strengthBar.style.width = "0%";
    return;
  }

  let score = 0;
  if (pwd.length >= 8) score++;
  if (pwd.length >= 12) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[a-z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;

  let width = "0%";
  let label = "Very Weak";
  let color = "#ef4444"; // red

  if (pwd.length < 6) {
    width = "15%";
    label = "Too Short";
    color = "#ef4444";
  } else if (score <= 2) {
    width = "30%";
    label = "Weak";
    color = "#f97316"; // orange
  } else if (score <= 4) {
    width = "60%";
    label = "Good";
    color = "#eab308"; // yellow
  } else {
    width = "100%";
    label = "Strong";
    color = "#10b981"; // emerald green
  }

  strengthText.textContent = label;
  strengthText.style.color = color;
  strengthBar.style.width = width;
  strengthBar.style.backgroundColor = color;
}

function generatePassword() {
  errorsEl.textContent = "";

  // Safe parsing & clamping bounds to prevent overflows
  let len = parseInt(lengthEl.value, 10);
  if (isNaN(len) || len < 4) len = 4;
  if (len > 128) len = 128;
  lengthEl.value = len;

  let qty = parseInt(quantityEl.value, 10);
  if (isNaN(qty) || qty < 1) qty = 1;
  if (qty > 50) qty = 50;
  quantityEl.value = qty;

  let upperPool = upperLetters;
  let lowerPool = lowerLetters;
  let numPool = numbers;
  let symPool = symbols;

  if (excludeSimilarEl.checked) {
    upperPool = upperPool.replace(similarChars, '');
    lowerPool = lowerPool.replace(similarChars, '');
    numPool = numPool.replace(similarChars, '');
    symPool = symPool.replace(similarChars, '');
  }

  let chars = "";
  if (uppercaseEl.checked) chars += upperPool;
  if (lowercaseEl.checked) chars += lowerPool;
  if (numbersEl.checked) chars += numPool;
  if (symbolsEl.checked) chars += symPool;

  if (chars === "") {
    errorsEl.textContent = "Please select at least one character type.";
    passwordEl.value = "";
    analyzeStrength("");
    singlePwPanel.style.display = "block";
    multiPwPanel.style.display = "none";
    return;
  }

  const generatedPasswords = [];

  for (let q = 0; q < qty; q++) {
    let password = "";
    const array = new Uint32Array(len);
    window.crypto.getRandomValues(array);

    for (let i = 0; i < len; i++) {
      password += chars.charAt(array[i] % chars.length);
    }
    generatedPasswords.push(password);
  }

  if (qty === 1) {
    // Single password display mode
    passwordEl.value = generatedPasswords[0];
    analyzeStrength(generatedPasswords[0]);
    singlePwPanel.style.display = "block";
    multiPwPanel.style.display = "none";
  } else {
    // Multiple password display mode
    singlePwPanel.style.display = "none";
    multiPwPanel.style.display = "block";
    multiOutput.innerHTML = "";

    generatedPasswords.forEach((pw, index) => {
      const itemDiv = document.createElement('div');
      itemDiv.className = 'multi-item';

      const pwSpan = document.createElement('span');
      pwSpan.className = 'multi-pw';
      pwSpan.textContent = pw;

      const cBtn = document.createElement('button');
      cBtn.className = 'item-copy-btn';
      cBtn.textContent = 'Copy';
      cBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(pw).then(() => {
          const orig = cBtn.textContent;
          cBtn.textContent = 'Copied!';
          setTimeout(() => cBtn.textContent = orig, 1500);
        });
      });

      itemDiv.appendChild(pwSpan);
      itemDiv.appendChild(cBtn);
      multiOutput.appendChild(itemDiv);
    });

    // Setup Copy All Button
    copyAllBtn.onclick = () => {
      const allText = generatedPasswords.join('\n');
      navigator.clipboard.writeText(allText).then(() => {
        const orig = copyAllBtn.textContent;
        copyAllBtn.textContent = 'Copied All!';
        setTimeout(() => copyAllBtn.textContent = orig, 1500);
      });
    };
  }
}

generateBtn.addEventListener('click', generatePassword);

copyBtn.addEventListener('click', () => {
  if (passwordEl.value) {
    navigator.clipboard.writeText(passwordEl.value);
    const originalText = copyBtn.textContent;
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = originalText, 2000);
  }
});

// Initial run
generatePassword();
</script>
</body>
</html>
