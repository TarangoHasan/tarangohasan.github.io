<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BMI Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 500px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0 0 10px;
  font-size: 24px;
}
p.lead {
  margin: 0 0 25px;
  color: var(--muted);
  font-size: 14px;
}
.input-group {
  text-align: left;
  margin-bottom: 20px;
}
label {
  display: block;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
  font-size: 16px;
}
input:focus {
  outline: none;
  border-color: var(--accent);
}
button {
  width: 100%;
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 14px;
  font-weight: 700;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  font-size: 16px;
  margin-top: 10px;
  transition: opacity 0.2s;
}
button:hover {
  opacity: 0.9;
}
.result-card {
  margin-top: 30px;
  padding: 20px;
  background: var(--glass);
  border-radius: 10px;
  display: none;
}
.bmi-value {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  margin: 10px 0;
}
.bmi-category {
  font-size: 18px;
  font-weight: 600;
}
.category-underweight { color: #93c5fd; }
.category-normal { color: #4ade80; }
.category-overweight { color: #fbbf24; }
.category-obese { color: #f87171; }
</style>
</head>
<body>
<div class="app" role="main">
  <h1>BMI Calculator</h1>
  <p class="lead">Calculate your Body Mass Index (BMI).</p>

  <div class="input-group">
    <label for="weight">Weight (kg)</label>
    <input type="number" id="weight" placeholder="e.g. 70" step="0.1" />
  </div>

  <div class="input-group">
    <label for="height">Height (cm)</label>
    <input type="number" id="height" placeholder="e.g. 175" step="0.1" />
  </div>

  <button id="calculateBtn">Calculate BMI</button>

  <div id="resultCard" class="result-card">
    <div class="bmi-category" id="bmiCategory">Normal</div>
    <div class="bmi-value" id="bmiValue">22.9</div>
    <p id="bmiDescription" style="font-size: 13px; color: var(--muted); margin: 0;"></p>
  </div>
</div>
<script>
const weightInput = document.getElementById('weight');
const heightInput = document.getElementById('height');
const calculateBtn = document.getElementById('calculateBtn');
const resultCard = document.getElementById('resultCard');
const bmiValueDisplay = document.getElementById('bmiValue');
const bmiCategoryDisplay = document.getElementById('bmiCategory');
const bmiDescriptionDisplay = document.getElementById('bmiDescription');

calculateBtn.addEventListener('click', () => {
  const weight = parseFloat(weightInput.value);
  const height = parseFloat(heightInput.value) / 100; // convert cm to m

  if (isNaN(weight) || isNaN(height) || height <= 0 || weight <= 0) {
    alert('Please enter valid weight and height.');
    return;
  }

  const bmi = weight / (height * height);
  const bmiFormatted = bmi.toFixed(1);

  bmiValueDisplay.textContent = bmiFormatted;
  resultCard.style.display = 'block';

  let category = '';
  let colorClass = '';
  let description = '';

  if (bmi < 18.5) {
    category = 'Underweight';
    colorClass = 'category-underweight';
    description = 'You are in the underweight range.';
  } else if (bmi < 25) {
    category = 'Normal Weight';
    colorClass = 'category-normal';
    description = 'You are in the healthy weight range.';
  } else if (bmi < 30) {
    category = 'Overweight';
    colorClass = 'category-overweight';
    description = 'You are in the overweight range.';
  } else {
    category = 'Obese';
    colorClass = 'category-obese';
    description = 'You are in the obese range.';
  }

  bmiCategoryDisplay.textContent = category;
  bmiCategoryDisplay.className = 'bmi-category ' + colorClass;
  bmiDescriptionDisplay.textContent = description;
});
</script>
</body>
</html>
