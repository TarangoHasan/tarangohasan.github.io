<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 400px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.bpm-display {
  font-size: 64px;
  font-weight: 700;
  margin: 20px 0;
  color: var(--accent);
}
.tap-btn {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 4px solid var(--accent);
  background: var(--glass);
  color: var(--accent);
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.tap-btn:active, .tap-btn.active {
  transform: scale(0.95);
  background: var(--accent);
  color: #042027;
}
.stats {
  margin-top: 20px;
  font-size: 14px;
  color: var(--muted);
}
button.reset-btn {
  margin-top: 20px;
  background: transparent;
  border: 1px solid var(--muted);
  color: var(--muted);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
}
button.reset-btn:hover {
  border-color: #fff;
  color: #fff;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap the button or press any key to calculate BPM.</p>

  <div class="bpm-display" id="bpm">0</div>

  <div class="tap-btn" id="tapBtn">TAP</div>

  <div class="stats">
    Taps: <span id="tapCount">0</span> | Average BPM
  </div>

  <button class="reset-btn" id="resetBtn">Reset</button>
</div>

<script>
let taps = [];
const bpmDisplay = document.getElementById('bpm');
const tapCountDisplay = document.getElementById('tapCount');
const tapBtn = document.getElementById('tapBtn');
const resetBtn = document.getElementById('resetBtn');

function handleTap() {
  const now = Date.now();
  taps.push(now);

  if (taps.length > 1) {
    if (now - taps[taps.length - 2] > 3000) {
      // If more than 3 seconds since last tap, restart
      taps = [now];
    }
  }

  if (taps.length > 1) {
    const intervals = [];
    for (let i = 1; i < taps.length; i++) {
      intervals.push(taps[i] - taps[i-1]);
    }

    // Use last 10 intervals for a moving average if we have many taps
    const recentIntervals = intervals.slice(-10);
    const avgInterval = recentIntervals.reduce((a, b) => a + b) / recentIntervals.length;
    const bpm = Math.round(60000 / avgInterval);
    bpmDisplay.textContent = bpm;
  }

  tapCountDisplay.textContent = taps.length;

  tapBtn.classList.add('active');
  setTimeout(() => tapBtn.classList.remove('active'), 100);
}

tapBtn.addEventListener('mousedown', (e) => {
  e.preventDefault();
  handleTap();
});

tapBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handleTap();
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
  }
  handleTap();
});

resetBtn.addEventListener('click', () => {
  taps = [];
  bpmDisplay.textContent = '0';
  tapCountDisplay.textContent = '0';
});
</script>
</body>
</html>
