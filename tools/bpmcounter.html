<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 400px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 24px;
}
p.lead {
  margin: 6px 0 24px;
  color: var(--muted);
  font-size: 14px;
}
.bpm-display {
  font-size: 64px;
  font-weight: 800;
  color: var(--accent);
  margin: 20px 0;
}
.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 24px;
  color: var(--muted);
  font-size: 14px;
}
.tap-btn {
  width: 100%;
  height: 120px;
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  border-radius: 12px;
  color: #042027;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
  user-select: none;
}
.tap-btn:active {
  transform: scale(0.98);
  opacity: 0.9;
}
.reset-btn {
  margin-top: 20px;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--muted);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}
.reset-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
@media (max-width: 768px) {
  .app {
    padding: 20px;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap the button or press Space to calculate BPM.</p>

  <div class="bpm-display" id="bpm">0</div>

  <div class="stats">
    <div>Taps: <span id="count">0</span></div>
    <div>Average: <span id="avg">0</span></div>
  </div>

  <button class="tap-btn" id="tapBtn">TAP</button>
  <button class="reset-btn" id="resetBtn">Reset</button>
</div>
<script>
const bpmDisplay = document.getElementById('bpm');
const countDisplay = document.getElementById('count');
const avgDisplay = document.getElementById('avg');
const tapBtn = document.getElementById('tapBtn');
const resetBtn = document.getElementById('resetBtn');

let taps = [];
const maxTaps = 10;

function tap() {
  const now = Date.now();
  taps.push(now);
  if (taps.length > maxTaps) {
    taps.shift();
  }

  if (taps.length > 1) {
    const intervals = [];
    for (let i = 1; i < taps.length; i++) {
      intervals.push(taps[i] - taps[i-1]);
    }
    const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
    const bpm = Math.round(60000 / avgInterval);
    bpmDisplay.textContent = bpm;
    avgDisplay.textContent = bpm;
  }

  countDisplay.textContent = taps.length;
}

function reset() {
  taps = [];
  bpmDisplay.textContent = '0';
  countDisplay.textContent = '0';
  avgDisplay.textContent = '0';
}

tapBtn.addEventListener('click', tap);
resetBtn.addEventListener('click', reset);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    tap();
  }
});
</script>
</body>
</html>
