<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 400px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 24px;
}
p.lead {
  margin: 6px 0 24px;
  color: var(--muted);
  font-size: 14px;
}
.bpm-display {
  font-size: 64px;
  font-weight: 800;
  color: var(--accent);
  margin: 20px 0;
}
.tap-btn {
  width: 100%;
  height: 120px;
  background: var(--glass);
  border: 2px dashed rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: #e6eef6;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.tap-btn:active, .tap-btn.active {
  background: rgba(6, 182, 212, 0.1);
  border-color: var(--accent);
  transform: scale(0.98);
}
.stats {
  margin-top: 20px;
  display: flex;
  justify-content: space-around;
  color: var(--muted);
  font-size: 14px;
}
.reset-btn {
  margin-top: 20px;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--muted);
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
}
.reset-btn:hover {
  color: #e6eef6;
  border-color: rgba(255, 255, 255, 0.3);
}
.back-link {
  display: block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
  text-align: left;
}
.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap the button or press Spacebar to calculate BPM.</p>

  <div class="bpm-display" id="bpm">0</div>
  <button class="tap-btn" id="tap-btn">TAP / SPACEBAR</button>

  <div class="stats">
    <div>Count: <span id="count">0</span></div>
    <div>Avg BPM: <span id="avg-bpm">0</span></div>
  </div>

  <button class="reset-btn" id="reset-btn">Reset</button>
</div>

<script>
let taps = [];
const bpmDisplay = document.getElementById('bpm');
const tapBtn = document.getElementById('tap-btn');
const countDisplay = document.getElementById('count');
const avgBpmDisplay = document.getElementById('avg-bpm');
const resetBtn = document.getElementById('reset-btn');

function handleTap(e) {
  if (e) e.preventDefault();

  const now = Date.now();
  taps.push(now);

  if (taps.length > 1) {
    const intervals = [];
    // Only take last 10 taps for rolling average
    const recentTaps = taps.slice(-11);
    for (let i = 1; i < recentTaps.length; i++) {
      intervals.push(recentTaps[i] - recentTaps[i-1]);
    }

    const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
    const bpm = Math.round(60000 / avgInterval);

    bpmDisplay.textContent = bpm;
    avgBpmDisplay.textContent = bpm;
  }

  countDisplay.textContent = taps.length;

  tapBtn.classList.add('active');
  setTimeout(() => tapBtn.classList.remove('active'), 100);
}

function reset() {
  taps = [];
  bpmDisplay.textContent = '0';
  countDisplay.textContent = '0';
  avgBpmDisplay.textContent = '0';
}

tapBtn.addEventListener('mousedown', handleTap);
tapBtn.addEventListener('touchstart', handleTap);

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    handleTap();
  }
});

resetBtn.addEventListener('click', reset);
</script>
</body>
</html>
