<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 400px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
#tap-area {
  width: 100%;
  height: 200px;
  background: var(--glass);
  border: 2px dashed rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
  margin-bottom: 20px;
}
#tap-area:active {
  background: rgba(255, 255, 255, 0.1);
}
.bpm-display {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 10px;
}
.bpm-label {
  font-size: 14px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 20px;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 20px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  transition: opacity 0.2s;
}
button:hover {
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap or press Space to measure BPM.</p>

  <div id="tap-area">TAP HERE</div>

  <div class="bpm-display" id="bpm">--</div>
  <div class="bpm-label">Beats Per Minute</div>

  <button id="reset-btn">Reset</button>
</div>

<script>
let taps = [];
const bpmDisplay = document.getElementById('bpm');
const tapArea = document.getElementById('tap-area');
const resetBtn = document.getElementById('reset-btn');

function handleTap() {
  const now = performance.now();
  taps.push(now);

  if (taps.length > 10) {
    taps.shift();
  }

  if (taps.length > 1) {
    const intervals = [];
    for (let i = 1; i < taps.length; i++) {
      intervals.push(taps[i] - taps[i-1]);
    }
    const averageInterval = intervals.reduce((a, b) => a + b) / intervals.length;
    const bpm = 60000 / averageInterval;
    bpmDisplay.textContent = Math.round(bpm);
  } else {
    bpmDisplay.textContent = '--';
  }
}

tapArea.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  handleTap();
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    handleTap();
  }
});

resetBtn.addEventListener('click', () => {
  taps = [];
  bpmDisplay.textContent = '--';
});
</script>
</body>
</html>
