<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 400px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.tap-area {
  width: 100%;
  height: 200px;
  background: var(--glass);
  border: 2px dashed var(--accent);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
  margin-bottom: 20px;
  transition: background 0.1s;
}
.tap-area:active {
  background: rgba(6, 182, 212, 0.1);
}
.bpm-display {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  margin: 20px 0;
}
.stats {
  font-size: 14px;
  color: var(--muted);
}
button {
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 8px 16px;
  border-radius: 8px;
  color: inherit;
  cursor: pointer;
  margin-top: 15px;
}
button:hover {
  background: rgba(255, 255, 255, 0.05);
}
.back-link {
  display: block;
  text-align: left;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap or press Space to calculate Beats Per Minute.</p>

  <div class="tap-area" id="tap-area">
    TAP HERE
  </div>

  <div class="bpm-display" id="bpm-value">0</div>
  <div class="stats" id="stats">Taps: 0 | Average: 0ms</div>

  <button id="reset">Reset</button>
</div>

<script>
let taps = [];
const maxTaps = 10;
const tapArea = document.getElementById('tap-area');
const bpmDisplay = document.getElementById('bpm-value');
const statsDisplay = document.getElementById('stats');
const resetBtn = document.getElementById('reset');

function handleTap(e) {
  if (e) e.preventDefault();

  const now = performance.now();
  taps.push(now);

  if (taps.length > maxTaps) {
    taps.shift();
  }

  calculateBPM();
}

function calculateBPM() {
  if (taps.length < 2) {
    bpmDisplay.textContent = '0';
    statsDisplay.textContent = `Taps: ${taps.length} | Average: 0ms`;
    return;
  }

  const intervals = [];
  for (let i = 1; i < taps.length; i++) {
    intervals.push(taps[i] - taps[i-1]);
  }

  const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
  const bpm = Math.round(60000 / avgInterval);

  bpmDisplay.textContent = bpm;
  statsDisplay.textContent = `Taps: ${taps.length} | Average: ${Math.round(avgInterval)}ms`;
}

function reset() {
  taps = [];
  bpmDisplay.textContent = '0';
  statsDisplay.textContent = 'Taps: 0 | Average: 0ms';
}

tapArea.addEventListener('pointerdown', handleTap);

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    handleTap();
  }
});

resetBtn.addEventListener('click', reset);
</script>
</body>
</html>
