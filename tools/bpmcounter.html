<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 500px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 24px;
}
p.lead {
  margin: 10px 0 30px;
  color: var(--muted);
  font-size: 14px;
}
.bpm-display {
  font-size: 80px;
  font-weight: 800;
  color: var(--accent);
  margin: 20px 0;
}
.tap-area {
  width: 100%;
  height: 200px;
  background: var(--glass);
  border: 2px dashed rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
  margin-bottom: 20px;
}
.tap-area:active {
  transform: scale(0.98);
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--accent);
}
.controls {
  display: flex;
  gap: 15px;
  justify-content: center;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 12px 24px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  transition: opacity 0.2s;
}
button:hover {
  opacity: 0.9;
}
.back-link {
  display: block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
  text-align: left;
}
.back-link:hover {
  text-decoration: underline;
}
@media (max-width: 480px) {
  .bpm-display {
    font-size: 60px;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap the area or press any key to calculate BPM.</p>

  <div class="bpm-display" id="bpm">0</div>
  <div class="tap-area" id="tapArea">TAP HERE</div>

  <div class="controls">
    <button id="resetBtn">Reset</button>
  </div>
</div>

<script>
const bpmDisplay = document.getElementById('bpm');
const tapArea = document.getElementById('tapArea');
const resetBtn = document.getElementById('resetBtn');

let taps = [];
const MAX_TAPS = 10;

function tap() {
  const now = Date.now();
  taps.push(now);

  if (taps.length > MAX_TAPS) {
    taps.shift();
  }

  if (taps.length > 1) {
    const intervals = [];
    for (let i = 1; i < taps.length; i++) {
      intervals.push(taps[i] - taps[i-1]);
    }

    const averageInterval = intervals.reduce((a, b) => a + b) / intervals.length;
    const bpm = Math.round(60000 / averageInterval);
    bpmDisplay.textContent = bpm;
  } else {
    bpmDisplay.textContent = '--';
  }
}

function reset() {
  taps = [];
  bpmDisplay.textContent = '0';
}

tapArea.addEventListener('mousedown', (e) => {
  e.preventDefault();
  tap();
});

tapArea.addEventListener('touchstart', (e) => {
  e.preventDefault();
  tap();
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key.length === 1) {
    if (e.code === 'Space') e.preventDefault();
    tap();
  }
});

resetBtn.addEventListener('click', reset);
</script>
</body>
</html>
