<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 400px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.bpm-display {
  font-size: 64px;
  font-weight: 700;
  color: var(--accent);
  margin: 20px 0;
}
.tap-area {
  width: 100%;
  height: 200px;
  background: var(--glass);
  border: 2px dashed rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.tap-area:active {
  background: rgba(255, 255, 255, 0.08);
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
.controls {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 20px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  font-size: 14px;
}
.stats {
    margin-top: 15px;
    font-size: 14px;
    color: var(--muted);
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap or press any key to calculate BPM.</p>

  <div class="bpm-display" id="bpm">0</div>

  <div class="tap-area" id="tap-area">
    TAP HERE
  </div>

  <div class="controls">
    <button id="reset-btn">Reset</button>
  </div>

  <div class="stats">
    Taps: <span id="tap-count">0</span>
  </div>
</div>
<script>
const bpmDisplay = document.getElementById('bpm');
const tapArea = document.getElementById('tap-area');
const resetBtn = document.getElementById('reset-btn');
const tapCountDisplay = document.getElementById('tap-count');

let timestamps = [];
const maxTaps = 10;

function handleTap() {
    const now = Date.now();
    timestamps.push(now);

    if (timestamps.length > 1) {
        if (timestamps.length > maxTaps) {
            timestamps.shift();
        }

        const intervals = [];
        for (let i = 1; i < timestamps.length; i++) {
            intervals.push(timestamps[i] - timestamps[i-1]);
        }

        const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
        const bpm = 60000 / avgInterval;
        bpmDisplay.textContent = Math.round(bpm);
    }

    tapCountDisplay.textContent = timestamps.length;
}

function reset() {
    timestamps = [];
    bpmDisplay.textContent = '0';
    tapCountDisplay.textContent = '0';
}

tapArea.addEventListener('mousedown', (e) => {
    e.preventDefault();
    handleTap();
});

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === 'Enter') {
        e.preventDefault();
    }
    handleTap();
});

resetBtn.addEventListener('click', reset);
</script>
</body>
</html>
