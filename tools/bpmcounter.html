<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM Counter</title>
    <style>
        :root {
            --bg: #0f1724;
            --card: #0b1220;
            --accent: #06b6d4;
            --muted: #9aa8b2;
            --glass: rgba(255, 255, 255, 0.03);
        }
        html, body {
            min-height: 100%;
            margin: 0;
            font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
            background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
            color: #e6eef6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
        }
        .app {
            width: 500px;
            max-width: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        p.lead {
            margin: 10px 0 30px;
            color: var(--muted);
            font-size: 14px;
        }
        .bpm-display {
            font-size: 80px;
            font-weight: 800;
            color: var(--accent);
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }
        .tap-area {
            width: 100%;
            height: 200px;
            background: var(--glass);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .tap-area:active, .tap-area.active {
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--accent);
            transform: scale(0.98);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn-reset {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e6eef6;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app" role="main">
        <a href="../index.html" class="back-link">← Back to Home</a>
        <h1>BPM Counter</h1>
        <p class="lead">Tap or press Space to calculate BPM.</p>

        <div class="bpm-display" id="bpmDisplay">0</div>

        <div class="tap-area" id="tapArea">
            TAP HERE
        </div>

        <div class="stats">
            <div id="tapCount">Taps: 0</div>
            <div id="lastBpm">Last: 0</div>
        </div>

        <button class="btn-reset" id="resetBtn">Reset</button>
    </div>

    <script>
        const tapArea = document.getElementById('tapArea');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const tapCountDisplay = document.getElementById('tapCount');
        const lastBpmDisplay = document.getElementById('lastBpm');
        const resetBtn = document.getElementById('resetBtn');

        let taps = [];
        const MAX_TAPS = 10;

        function handleTap(e) {
            if (e) e.preventDefault();

            const now = performance.now();
            taps.push(now);

            if (taps.length > 1) {
                if (taps.length > MAX_TAPS) {
                    taps.shift();
                }

                const intervals = [];
                for (let i = 1; i < taps.length; i++) {
                    intervals.push(taps[i] - taps[i-1]);
                }

                const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
                const bpm = 60000 / avgInterval;

                bpmDisplay.textContent = Math.round(bpm);
                lastBpmDisplay.textContent = `Last: ${Math.round(bpm)}`;
            }

            tapCountDisplay.textContent = `Taps: ${taps.length}`;

            tapArea.classList.add('active');
            setTimeout(() => tapArea.classList.remove('active'), 100);
        }

        function reset() {
            taps = [];
            bpmDisplay.textContent = '0';
            tapCountDisplay.textContent = 'Taps: 0';
            lastBpmDisplay.textContent = 'Last: 0';
        }

        tapArea.addEventListener('pointerdown', handleTap);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });

        resetBtn.addEventListener('click', reset);
    </script>
</body>
</html>
