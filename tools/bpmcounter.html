<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BPM Counter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 400px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
#tap-area {
  width: 100%;
  height: 200px;
  background: var(--glass);
  border: 2px dashed var(--accent);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
  margin-bottom: 20px;
  transition: background 0.1s;
}
#tap-area:active {
  background: rgba(6, 182, 212, 0.1);
}
.bpm-display {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  margin: 10px 0;
}
.stats {
  color: var(--muted);
  font-size: 14px;
}
button {
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 8px 16px;
  border-radius: 6px;
  color: inherit;
  cursor: pointer;
  margin-top: 15px;
}
button:hover {
  background: rgba(255, 255, 255, 0.05);
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>BPM Counter</h1>
  <p class="lead">Tap or press Space to calculate BPM.</p>

  <div id="tap-area">TAP HERE</div>

  <div class="bpm-display" id="bpm-value">0</div>
  <div class="stats">
    Taps: <span id="tap-count">0</span> |
    Average BPM: <span id="avg-bpm">0</span>
  </div>

  <button id="reset-btn">Reset</button>
</div>

<script>
  let taps = [];
  const tapArea = document.getElementById('tap-area');
  const bpmValue = document.getElementById('bpm-value');
  const tapCountDisplay = document.getElementById('tap-count');
  const avgBpmDisplay = document.getElementById('avg-bpm');
  const resetBtn = document.getElementById('reset-btn');

  function handleTap() {
    const now = performance.now();
    taps.push(now);

    if (taps.length > 1) {
      if (taps.length > 11) {
        taps.shift();
      }

      const intervals = [];
      for (let i = 1; i < taps.length; i++) {
        intervals.push(taps[i] - taps[i-1]);
      }

      const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
      const bpm = Math.round(60000 / avgInterval);

      bpmValue.textContent = bpm;
      avgBpmDisplay.textContent = bpm;
    }

    tapCountDisplay.textContent = taps.length + (taps.length > 10 ? ' (last 10)' : '');

    tapArea.style.background = 'rgba(6, 182, 212, 0.2)';
    setTimeout(() => {
      tapArea.style.background = 'var(--glass)';
    }, 100);
  }

  tapArea.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    handleTap();
  });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      handleTap();
    }
  });

  resetBtn.addEventListener('click', () => {
    taps = [];
    bpmValue.textContent = '0';
    tapCountDisplay.textContent = '0';
    avgBpmDisplay.textContent = '0';
  });
</script>
</body>
</html>
