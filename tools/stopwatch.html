<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stopwatch</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.display {
  font-size: 48px;
  font-family: monospace;
  margin: 20px 0;
  padding: 20px;
  background: var(--glass);
  border-radius: 12px;
}
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 20px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  min-width: 80px;
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.laps {
  max-height: 200px;
  overflow-y: auto;
  text-align: left;
  background: var(--glass);
  border-radius: 8px;
  padding: 10px;
}
.lap-item {
  padding: 5px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  display: flex;
  justify-content: space-between;
}
.lap-item:last-child {
  border-bottom: none;
}
</style>
</head>
<body>
<div class="app" role="main">
  <h1>Stopwatch</h1>
  <p class="lead">Simple and accurate stopwatch tool.</p>
  <div class="display" id="display">00:00:00.000</div>
  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
    <button id="lapBtn" disabled>Lap</button>
    <button id="resetBtn">Reset</button>
  </div>
  <div class="laps" id="laps">
    <!-- Laps will appear here -->
  </div>
</div>
<script>
let startTime;
let elapsedTime = 0;
let timerInterval;
let lapCount = 0;

const display = document.getElementById('display');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const lapBtn = document.getElementById('lapBtn');
const resetBtn = document.getElementById('resetBtn');
const lapsContainer = document.getElementById('laps');

function timeToString(time) {
  let diffInHrs = time / 3600000;
  let hh = Math.floor(diffInHrs);

  let diffInMin = (diffInHrs - hh) * 60;
  let mm = Math.floor(diffInMin);

  let diffInSec = (diffInMin - mm) * 60;
  let ss = Math.floor(diffInSec);

  let diffInMs = (diffInSec - ss) * 1000;
  let ms = Math.floor(diffInMs);

  let formattedHH = hh.toString().padStart(2, "0");
  let formattedMM = mm.toString().padStart(2, "0");
  let formattedSS = ss.toString().padStart(2, "0");
  let formattedMS = ms.toString().padStart(3, "0");

  return `${formattedHH}:${formattedMM}:${formattedSS}.${formattedMS}`;
}

function print(txt) {
  display.textContent = txt;
}

function start() {
  startTime = Date.now() - elapsedTime;
  timerInterval = setInterval(function printTime() {
    elapsedTime = Date.now() - startTime;
    print(timeToString(elapsedTime));
  }, 10);
  showButton("STOP");
}

function stop() {
  clearInterval(timerInterval);
  showButton("START");
}

function reset() {
  clearInterval(timerInterval);
  print("00:00:00.000");
  elapsedTime = 0;
  lapCount = 0;
  lapsContainer.innerHTML = "";
  showButton("START");
}

function lap() {
  lapCount++;
  const lapTime = timeToString(elapsedTime);
  const lapElement = document.createElement('div');
  lapElement.classList.add('lap-item');
  lapElement.innerHTML = `<span>Lap ${lapCount}</span><span>${lapTime}</span>`;
  lapsContainer.prepend(lapElement);
}

function showButton(buttonKey) {
  if (buttonKey === "STOP") {
    startBtn.disabled = true;
    stopBtn.disabled = false;
    lapBtn.disabled = false;
  } else {
    startBtn.disabled = false;
    stopBtn.disabled = true;
    lapBtn.disabled = true;
  }
}

startBtn.addEventListener("click", start);
stopBtn.addEventListener("click", stop);
resetBtn.addEventListener("click", reset);
lapBtn.addEventListener("click", lap);
</script>
</body>
</html>
