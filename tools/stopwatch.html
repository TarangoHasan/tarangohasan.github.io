<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stopwatch & Timer</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
* {
  box-sizing: border-box;
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
}
h1 {
  margin: 0;
  font-size: 24px;
  font-weight: 700;
}
p.lead {
  margin: 6px 0 20px;
  color: var(--muted);
  font-size: 14px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}

/* Tabs UI */
.tabs {
  display: flex;
  background: var(--glass);
  padding: 4px;
  border-radius: 8px;
  margin-bottom: 24px;
  border: 1px solid rgba(255, 255, 255, 0.02);
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  padding: 10px;
  color: var(--muted);
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s ease;
  font-size: 14px;
}
.tab-btn.active {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  color: #042027;
}

/* Common display and input */
.display {
  font-size: 48px;
  font-family: monospace;
  margin: 20px 0;
  padding: 20px;
  background: var(--glass);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.02);
  letter-spacing: 1px;
}
.controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 24px;
}
button.control-btn {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 12px 20px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  min-width: 90px;
  transition: opacity 0.2s ease, transform 0.1s ease;
  font-size: 14px;
}
button.control-btn:hover {
  opacity: 0.9;
}
button.control-btn:active {
  transform: scale(0.97);
}
button.control-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

/* Laps */
.laps-container {
  margin-top: 20px;
}
.laps-header {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-size: 13px;
  padding: 6px 12px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.laps {
  max-height: 200px;
  overflow-y: auto;
  text-align: left;
  background: var(--glass);
  border-radius: 8px;
  padding: 8px 12px;
  border: 1px solid rgba(255, 255, 255, 0.02);
}
.lap-item {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  display: flex;
  justify-content: space-between;
  font-family: monospace;
  font-size: 14px;
}
.lap-item:last-child {
  border-bottom: none;
}

/* Timer inputs */
.timer-inputs {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-bottom: 20px;
}
.input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 80px;
}
.input-group label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.input-group input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.05);
  color: #e6eef6;
  text-align: center;
  font-size: 18px;
  font-family: monospace;
}
.input-group input:focus {
  outline: none;
  border-color: var(--accent);
}

/* Tab Views */
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

/* Mobile Responsiveness */
@media (max-width: 768px) {
  .app {
    padding: 20px 15px;
  }
  .display {
    font-size: 36px;
    padding: 15px;
  }
  .controls {
    flex-direction: column !important;
    gap: 10px;
  }
  button.control-btn {
    width: 100%;
  }
  .timer-inputs {
    gap: 10px;
  }
  .input-group {
    width: 70px;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Stopwatch & Timer</h1>
  <p class="lead">Dual-mode timing tool with audio completion chime.</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('stopwatch')">Stopwatch</button>
    <button class="tab-btn" onclick="switchTab('timer')">Countdown Timer</button>
  </div>

  <!-- Stopwatch Panel -->
  <div id="stopwatch-tab" class="tab-content active">
    <div class="display" id="display">00:00:00.000</div>
    <div class="controls">
      <button id="startBtn" class="control-btn">Start</button>
      <button id="stopBtn" class="control-btn" disabled>Pause</button>
      <button id="lapBtn" class="control-btn" disabled>Lap</button>
      <button id="resetBtn" class="control-btn">Reset</button>
    </div>
    <div class="laps-container">
      <div class="laps-header">
        <span>Lap #</span>
        <span>Split Time</span>
      </div>
      <div class="laps" id="laps">
        <div style="text-align: center; color: var(--muted); padding: 15px 0;" id="no-laps">No laps recorded yet.</div>
      </div>
    </div>
  </div>

  <!-- Countdown Timer Panel -->
  <div id="timer-tab" class="tab-content">
    <div class="timer-inputs">
      <div class="input-group">
        <label for="timer-hours">Hours</label>
        <input type="number" id="timer-hours" min="0" max="23" value="0" placeholder="00" />
      </div>
      <div class="input-group">
        <label for="timer-minutes">Min</label>
        <input type="number" id="timer-minutes" min="0" max="59" value="5" placeholder="05" />
      </div>
      <div class="input-group">
        <label for="timer-seconds">Sec</label>
        <input type="number" id="timer-seconds" min="0" max="59" value="0" placeholder="00" />
      </div>
    </div>
    <div class="display" id="timer-display">00:05:00</div>
    <div class="controls">
      <button id="timer-startBtn" class="control-btn">Start</button>
      <button id="timer-pauseBtn" class="control-btn" disabled>Pause</button>
      <button id="timer-resetBtn" class="control-btn">Reset</button>
    </div>
  </div>
</div>

<script>
// Tab Switching
function switchTab(mode) {
  const tabs = document.querySelectorAll('.tab-btn');
  const contents = document.querySelectorAll('.tab-content');

  tabs.forEach(tab => {
    if (tab.textContent.toLowerCase().includes(mode)) {
      tab.classList.add('active');
    } else {
      tab.classList.remove('active');
    }
  });

  if (mode === 'stopwatch') {
    document.getElementById('stopwatch-tab').classList.add('active');
    document.getElementById('timer-tab').classList.remove('active');
  } else {
    document.getElementById('timer-tab').classList.add('active');
    document.getElementById('stopwatch-tab').classList.remove('active');
  }
}

// Stopwatch State
let swStartTime = 0;
let swElapsedTime = 0;
let swInterval = null;
let swLapCount = 0;

const display = document.getElementById('display');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const lapBtn = document.getElementById('lapBtn');
const resetBtn = document.getElementById('resetBtn');
const lapsContainer = document.getElementById('laps');
const noLapsPlaceholder = document.getElementById('no-laps');

function formatStopwatchTime(time) {
  let diffInHrs = time / 3600000;
  let hh = Math.floor(diffInHrs);
  let diffInMin = (diffInHrs - hh) * 60;
  let mm = Math.floor(diffInMin);
  let diffInSec = (diffInMin - mm) * 60;
  let ss = Math.floor(diffInSec);
  let diffInMs = (diffInSec - ss) * 1000;
  let ms = Math.floor(diffInMs);

  let formattedHH = hh.toString().padStart(2, "0");
  let formattedMM = mm.toString().padStart(2, "0");
  let formattedSS = ss.toString().padStart(2, "0");
  let formattedMS = ms.toString().padStart(3, "0");

  return `${formattedHH}:${formattedMM}:${formattedSS}.${formattedMS}`;
}

function updateStopwatchDisplay() {
  display.textContent = formatStopwatchTime(swElapsedTime);
}

startBtn.addEventListener('click', () => {
  swStartTime = Date.now() - swElapsedTime;
  swInterval = setInterval(() => {
    swElapsedTime = Date.now() - swStartTime;
    updateStopwatchDisplay();
  }, 10);

  startBtn.disabled = true;
  stopBtn.disabled = false;
  lapBtn.disabled = false;
});

stopBtn.addEventListener('click', () => {
  clearInterval(swInterval);
  swInterval = null;
  startBtn.disabled = false;
  stopBtn.disabled = true;
  lapBtn.disabled = true;
});

lapBtn.addEventListener('click', () => {
  swLapCount++;
  if (noLapsPlaceholder) {
    noLapsPlaceholder.remove();
  }
  const lapElement = document.createElement('div');
  lapElement.className = 'lap-item';
  lapElement.innerHTML = `<span>Lap ${swLapCount}</span><span>${formatStopwatchTime(swElapsedTime)}</span>`;
  lapsContainer.prepend(lapElement);
});

resetBtn.addEventListener('click', () => {
  clearInterval(swInterval);
  swInterval = null;
  swElapsedTime = 0;
  swLapCount = 0;
  updateStopwatchDisplay();

  lapsContainer.innerHTML = '<div style="text-align: center; color: var(--muted); padding: 15px 0;" id="no-laps">No laps recorded yet.</div>';

  startBtn.disabled = false;
  stopBtn.disabled = true;
  lapBtn.disabled = true;
});


// Timer State
let timerInterval = null;
let timerSecondsRemaining = 300; // default 5 mins
let isTimerPaused = true;

const timerDisplay = document.getElementById('timer-display');
const timerHoursInput = document.getElementById('timer-hours');
const timerMinutesInput = document.getElementById('timer-minutes');
const timerSecondsInput = document.getElementById('timer-seconds');
const timerStartBtn = document.getElementById('timer-startBtn');
const timerPauseBtn = document.getElementById('timer-pauseBtn');
const timerResetBtn = document.getElementById('timer-resetBtn');

function formatTimerTime(totalSeconds) {
  let hrs = Math.floor(totalSeconds / 3600);
  let mins = Math.floor((totalSeconds % 3600) / 60);
  let secs = totalSeconds % 60;

  let formattedHH = hrs.toString().padStart(2, "0");
  let formattedMM = mins.toString().padStart(2, "0");
  let formattedSS = secs.toString().padStart(2, "0");

  return `${formattedHH}:${formattedMM}:${formattedSS}`;
}

function updateTimerDisplay() {
  timerDisplay.textContent = formatTimerTime(timerSecondsRemaining);
}

function getTimerDurationFromInputs() {
  const hrs = parseInt(timerHoursInput.value) || 0;
  const mins = parseInt(timerMinutesInput.value) || 0;
  const secs = parseInt(timerSecondsInput.value) || 0;
  return (hrs * 3600) + (mins * 60) + secs;
}

function syncTimerDisplayFromInputs() {
  if (isTimerPaused) {
    timerSecondsRemaining = getTimerDurationFromInputs();
    updateTimerDisplay();
  }
}

[timerHoursInput, timerMinutesInput, timerSecondsInput].forEach(inp => {
  inp.addEventListener('input', () => {
    // Validate inputs
    let val = parseInt(inp.value) || 0;
    if (val < 0) val = 0;
    if (inp.id !== 'timer-hours' && val > 59) val = 59;
    if (inp.id === 'timer-hours' && val > 23) val = 23;
    inp.value = val;
    syncTimerDisplayFromInputs();
  });
});

function playChime() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;

    // Nice sequence of synthesized chime/bell notes
    const notes = [
      { freq: 523.25, time: now },       // C5
      { freq: 659.25, time: now + 0.15 },  // E5
      { freq: 783.99, time: now + 0.3 },   // G5
      { freq: 1046.50, time: now + 0.45 }  // C6
    ];

    notes.forEach(note => {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(note.freq, note.time);

      gainNode.gain.setValueAtTime(0, note.time);
      gainNode.gain.linearRampToValueAtTime(0.25, note.time + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.001, note.time + 0.8);

      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      osc.start(note.time);
      osc.stop(note.time + 0.8);
    });
  } catch (e) {
    console.error("Web Audio API not supported or blocked: ", e);
  }
}

timerStartBtn.addEventListener('click', () => {
  if (isTimerPaused) {
    if (timerSecondsRemaining <= 0) {
      timerSecondsRemaining = getTimerDurationFromInputs();
    }
    if (timerSecondsRemaining <= 0) return; // Cannot start 0 timer

    isTimerPaused = false;
    timerStartBtn.disabled = true;
    timerPauseBtn.disabled = false;

    // Disable inputs while running
    timerHoursInput.disabled = true;
    timerMinutesInput.disabled = true;
    timerSecondsInput.disabled = true;

    timerInterval = setInterval(() => {
      timerSecondsRemaining--;
      updateTimerDisplay();

      if (timerSecondsRemaining <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        isTimerPaused = true;
        playChime();

        // Re-enable controls
        timerStartBtn.disabled = false;
        timerPauseBtn.disabled = true;
        timerHoursInput.disabled = false;
        timerMinutesInput.disabled = false;
        timerSecondsInput.disabled = false;

        // Reset to initial inputs
        timerSecondsRemaining = getTimerDurationFromInputs();
        updateTimerDisplay();
      }
    }, 1000);
  }
});

timerPauseBtn.addEventListener('click', () => {
  if (!isTimerPaused) {
    clearInterval(timerInterval);
    timerInterval = null;
    isTimerPaused = true;
    timerStartBtn.disabled = false;
    timerPauseBtn.disabled = true;

    timerHoursInput.disabled = false;
    timerMinutesInput.disabled = false;
    timerSecondsInput.disabled = false;
  }
});

timerResetBtn.addEventListener('click', () => {
  clearInterval(timerInterval);
  timerInterval = null;
  isTimerPaused = true;

  timerHoursInput.disabled = false;
  timerMinutesInput.disabled = false;
  timerSecondsInput.disabled = false;

  timerSecondsRemaining = getTimerDurationFromInputs();
  updateTimerDisplay();

  timerStartBtn.disabled = false;
  timerPauseBtn.disabled = true;
});

// Initial load
syncTimerDisplayFromInputs();
</script>
</body>
</html>
