<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Image Converter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--muted);
}
input, select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 14px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
}

.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Image Converter</h1>
  <p class="lead">Convert images to PNG, JPG, or WEBP.</p>
  <label for="file">Choose Image</label>
  <input id="file" type="file" accept="image/*" />
  <div style="height:10px"></div>
  <label for="format">Convert to</label>
  <select id="format">
    <option value="image/png">PNG</option>
    <option value="image/jpeg">JPG</option>
    <option value="image/webp">WEBP</option>
  </select>
  <div style="height:10px"></div>
  <button id="convertBtn">Convert and Download</button>
  <div id="errors" style="margin-top:8px"></div>
</div>
<script>
const fileInput = document.getElementById('file');
const formatSelect = document.getElementById('format');
const convertBtn = document.getElementById('convertBtn');
const errors = document.getElementById('errors');

convertBtn.addEventListener('click', () => {
  const file = fileInput.files[0];
  if (!file) {
    errors.textContent = 'Please select an image file.';
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const format = formatSelect.value;
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const extension = format === 'image/jpeg' ? 'jpg' : format.split('/')[1];
        a.download = `converted.${extension}`;
        a.click();
        URL.revokeObjectURL(url);
      }, format);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
