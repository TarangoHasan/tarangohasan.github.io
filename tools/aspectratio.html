<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
.result-card {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
}
.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.result-row:last-child {
  margin-bottom: 0;
}
button.copy-btn {
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--accent);
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
}
button.copy-btn:hover {
  background: rgba(255, 255, 255, 0.1);
}
@media (max-width: 768px) {
  .stats, .actions, .flex-row {
    flex-direction: column !important;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate dimensions and simplified ratios.</p>

  <div class="flex-row" style="display: flex; gap: 15px;">
    <div style="flex: 1;">
      <label for="ratioWidth">Ratio Width</label>
      <input type="number" id="ratioWidth" value="16" />
    </div>
    <div style="flex: 1;">
      <label for="ratioHeight">Ratio Height</label>
      <input type="number" id="ratioHeight" value="9" />
    </div>
  </div>

  <div style="height: 15px;"></div>

  <div class="flex-row" style="display: flex; gap: 15px;">
    <div style="flex: 1;">
      <label for="width">Width (px)</label>
      <input type="number" id="width" value="1920" />
    </div>
    <div style="flex: 1;">
      <label for="height">Height (px)</label>
      <input type="number" id="height" value="1080" />
    </div>
  </div>

  <div class="result-card">
    <div class="result-row">
      <span>Simplified Ratio: <strong id="simplifiedRatio">16:9</strong></span>
      <button class="copy-btn" id="copyRatio">Copy</button>
    </div>
    <div class="result-row">
      <span>Dimensions: <strong id="currentDimensions">1920 x 1080</strong></span>
      <button class="copy-btn" id="copyDims">Copy</button>
    </div>
  </div>
</div>
<script>
const ratioWidth = document.getElementById('ratioWidth');
const ratioHeight = document.getElementById('ratioHeight');
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const simplifiedRatio = document.getElementById('simplifiedRatio');
const currentDimensions = document.getElementById('currentDimensions');
const copyRatioBtn = document.getElementById('copyRatio');
const copyDimsBtn = document.getElementById('copyDims');

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function updateSimplifiedRatio() {
  const w = parseInt(widthInput.value);
  const h = parseInt(heightInput.value);
  if (w > 0 && h > 0) {
    const common = gcd(w, h);
    simplifiedRatio.textContent = `${w / common}:${h / common}`;
    currentDimensions.textContent = `${w} x ${h}`;
  } else {
    simplifiedRatio.textContent = '0:0';
    currentDimensions.textContent = '0 x 0';
  }
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const originalText = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => {
      btn.textContent = originalText;
    }, 2000);
  });
}

copyRatioBtn.addEventListener('click', () => {
  copyToClipboard(simplifiedRatio.textContent, copyRatioBtn);
});

copyDimsBtn.addEventListener('click', () => {
  copyToClipboard(currentDimensions.textContent, copyDimsBtn);
});

widthInput.addEventListener('input', () => {
  const rw = parseFloat(ratioWidth.value);
  const rh = parseFloat(ratioHeight.value);
  const w = parseFloat(widthInput.value);
  if (rw > 0 && rh > 0 && w > 0) {
    heightInput.value = Math.round((w * rh) / rw);
  }
  updateSimplifiedRatio();
});

heightInput.addEventListener('input', () => {
  const rw = parseFloat(ratioWidth.value);
  const rh = parseFloat(ratioHeight.value);
  const h = parseFloat(heightInput.value);
  if (rw > 0 && rh > 0 && h > 0) {
    widthInput.value = Math.round((h * rw) / rh);
  }
  updateSimplifiedRatio();
});

ratioWidth.addEventListener('input', () => {
  const rw = parseFloat(ratioWidth.value);
  const rh = parseFloat(ratioHeight.value);
  const w = parseFloat(widthInput.value);
  if (rw > 0 && rh > 0 && w > 0) {
    heightInput.value = Math.round((w * rh) / rw);
  }
  updateSimplifiedRatio();
});

ratioHeight.addEventListener('input', () => {
  const rw = parseFloat(ratioWidth.value);
  const rh = parseFloat(ratioHeight.value);
  const w = parseFloat(widthInput.value);
  if (rw > 0 && rh > 0 && w > 0) {
    heightInput.value = Math.round((w * rh) / rw);
  }
  updateSimplifiedRatio();
});

updateSimplifiedRatio();
</script>
</body>
</html>
