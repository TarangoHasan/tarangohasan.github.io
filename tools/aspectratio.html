<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 500px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.input-group {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}
.input-field {
  flex: 1;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
}
.result-card {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  text-align: center;
}
.ratio-display {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
@media (max-width: 768px) {
  .input-group {
    flex-direction: column !important;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate and simplify aspect ratios.</p>

  <div class="input-group">
    <div class="input-field">
      <label for="width">Width</label>
      <input type="number" id="width" value="1920" />
    </div>
    <div class="input-field">
      <label for="height">Height</label>
      <input type="number" id="height" value="1080" />
    </div>
  </div>

  <div class="result-card">
    <label>Simplified Ratio</label>
    <div class="ratio-display" id="ratio">16:9</div>
    <div style="margin-top: 10px; font-size: 14px; color: var(--muted);" id="decimal">1.78:1</div>
  </div>
</div>
<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioDisplay = document.getElementById('ratio');
const decimalDisplay = document.getElementById('decimal');

function gcd(a, b) {
  return b ? gcd(b, a % b) : a;
}

function updateRatio() {
  const w = parseInt(widthInput.value);
  const h = parseInt(heightInput.value);

  if (w > 0 && h > 0) {
    const common = gcd(w, h);
    ratioDisplay.textContent = `${w / common}:${h / common}`;
    decimalDisplay.textContent = `${(w / h).toFixed(2)}:1`;
  } else {
    ratioDisplay.textContent = '-';
    decimalDisplay.textContent = '-';
  }
}

widthInput.addEventListener('input', updateRatio);
heightInput.addEventListener('input', updateRatio);

updateRatio();
</script>
</body>
</html>
