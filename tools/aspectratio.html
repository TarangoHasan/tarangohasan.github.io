<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 20px;
}
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 15px;
}
.preset-btn {
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.05);
  color: inherit;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: 0.2s;
}
.preset-btn:hover {
  background: rgba(255, 255, 255, 0.1);
}
.result-box {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.03);
}
.ratio-display {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate dimensions and ratios for images and videos.</p>

  <div class="grid">
    <div>
      <label for="width">Width (W)</label>
      <input type="number" id="width" placeholder="e.g., 1920" />
    </div>
    <div>
      <label for="height">Height (H)</label>
      <input type="number" id="height" placeholder="e.g., 1080" />
    </div>
  </div>

  <div class="grid">
    <div>
      <label for="ratioW">Ratio Width</label>
      <input type="number" id="ratioW" placeholder="e.g., 16" />
    </div>
    <div>
      <label for="ratioH">Ratio Height</label>
      <input type="number" id="ratioH" placeholder="e.g., 9" />
    </div>
  </div>

  <div class="result-box">
    <label>Calculated Ratio</label>
    <div id="ratio-text" class="ratio-display">-</div>
    <button id="calc-ratio-btn" class="preset-btn" style="margin-top: 10px;">Calculate Ratio from W & H</button>
  </div>

  <div class="presets">
    <button class="preset-btn" data-w="16" data-h="9">16:9 (HD)</button>
    <button class="preset-btn" data-w="4" data-h="3">4:3 (SD)</button>
    <button class="preset-btn" data-w="1" data-h="1">1:1 (Square)</button>
    <button class="preset-btn" data-w="21" data-h="9">21:9 (Ultrawide)</button>
    <button class="preset-btn" data-w="9" data-h="16">9:16 (Story)</button>
  </div>
</div>

<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioWInput = document.getElementById('ratioW');
const ratioHInput = document.getElementById('ratioH');
const ratioText = document.getElementById('ratio-text');
const calcRatioBtn = document.getElementById('calc-ratio-btn');
const presetBtns = document.querySelectorAll('.preset-btn');

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function updateFromDimensions() {
  const w = parseFloat(widthInput.value);
  const h = parseFloat(heightInput.value);

  if (w && h) {
    const common = gcd(w, h);
    ratioWInput.value = w / common;
    ratioHInput.value = h / common;
    updateRatioText(w, h);
  }
}

function updateHeight() {
  const w = parseFloat(widthInput.value);
  const rw = parseFloat(ratioWInput.value);
  const rh = parseFloat(ratioHInput.value);

  if (w && rw && rh) {
    heightInput.value = Math.round((w * rh) / rw);
    updateRatioText(w, heightInput.value);
  }
}

function updateWidth() {
  const h = parseFloat(heightInput.value);
  const rw = parseFloat(ratioWInput.value);
  const rh = parseFloat(ratioHInput.value);

  if (h && rw && rh) {
    widthInput.value = Math.round((h * rw) / rh);
    updateRatioText(widthInput.value, h);
  }
}

function updateRatioText(w, h) {
  if (w && h) {
    const common = gcd(w, h);
    ratioText.textContent = `${w / common}:${h / common}`;
  } else {
    ratioText.textContent = '-';
  }
}

widthInput.addEventListener('input', (e) => {
  if (document.activeElement === widthInput) {
    updateHeight();
  }
});

heightInput.addEventListener('input', (e) => {
  if (document.activeElement === heightInput) {
    updateWidth();
  }
});

ratioWInput.addEventListener('input', updateHeight);
ratioHInput.addEventListener('input', updateHeight);

calcRatioBtn.addEventListener('click', updateFromDimensions);

presetBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    ratioWInput.value = btn.dataset.w;
    ratioHInput.value = btn.dataset.h;
    updateHeight();
  });
});

</script>
</body>
</html>
