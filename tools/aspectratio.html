<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 500px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.flex-row {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
}
.flex-row > div {
  flex: 1;
}
.result-card {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
}
.result-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}
.result-item:last-child {
  margin-bottom: 0;
}
.result-label {
  color: var(--muted);
  font-size: 14px;
}
.result-value {
  font-weight: 600;
  color: var(--accent);
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
@media (max-width: 768px) {
  .flex-row {
    flex-direction: column !important;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate aspect ratios and simplified dimensions.</p>

  <div class="flex-row">
    <div>
      <label for="width">Width (px)</label>
      <input type="number" id="width" value="1920" placeholder="Width" />
    </div>
    <div>
      <label for="height">Height (px)</label>
      <input type="number" id="height" value="1080" placeholder="Height" />
    </div>
  </div>

  <div class="result-card">
    <div class="result-item">
      <span class="result-label">Ratio (W:1)</span>
      <span class="result-value" id="ratio">1.78:1</span>
    </div>
    <div class="result-item">
      <span class="result-label">Simplified Ratio</span>
      <span class="result-value" id="simplified">16:9</span>
    </div>
  </div>
</div>

<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioDisplay = document.getElementById('ratio');
const simplifiedDisplay = document.getElementById('simplified');

function gcd(a, b) {
  return b ? gcd(b, a % b) : a;
}

function calculate() {
  const w = parseFloat(widthInput.value);
  const h = parseFloat(heightInput.value);

  if (!w || !h || w <= 0 || h <= 0) {
    ratioDisplay.textContent = '-';
    simplifiedDisplay.textContent = '-';
    return;
  }

  const r = (w / h).toFixed(2);
  ratioDisplay.textContent = `${r}:1`;

  const common = gcd(w, h);
  simplifiedDisplay.textContent = `${w / common}:${h / common}`;
}

widthInput.addEventListener('input', calculate);
heightInput.addEventListener('input', calculate);

// Initial calculation
calculate();
</script>
</body>
</html>
