<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 500px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  margin-bottom: 15px;
  box-sizing: border-box;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
.card {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
}
.result {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
  text-align: center;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate the aspect ratio and find the simplified ratio for any dimensions.</p>

  <div class="card">
    <div style="display: flex; gap: 15px;">
      <div style="flex: 1;">
        <label for="width">Width</label>
        <input type="number" id="width" placeholder="e.g. 1920" value="1920" />
      </div>
      <div style="flex: 1;">
        <label for="height">Height</label>
        <input type="number" id="height" placeholder="e.g. 1080" value="1080" />
      </div>
    </div>
  </div>

  <div class="card">
    <label>Simplified Ratio</label>
    <div id="ratioResult" class="result">16:9</div>
  </div>

  <div class="card">
      <label>Decimal Aspect Ratio</label>
      <div id="decimalResult" class="result">1.778</div>
  </div>
</div>

<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioResult = document.getElementById('ratioResult');
const decimalResult = document.getElementById('decimalResult');

function gcd(a, b) {
    return b ? gcd(b, a % b) : a;
}

function calculate() {
    const w = parseFloat(widthInput.value);
    const h = parseFloat(heightInput.value);

    if (isNaN(w) || isNaN(h) || w <= 0 || h <= 0) {
        ratioResult.textContent = '--:--';
        decimalResult.textContent = '--';
        return;
    }

    const commonDivisor = gcd(w, h);
    const ratioW = w / commonDivisor;
    const ratioH = h / commonDivisor;

    ratioResult.textContent = `${ratioW}:${ratioH}`;
    decimalResult.textContent = (w / h).toFixed(3);
}

widthInput.addEventListener('input', calculate);
heightInput.addEventListener('input', calculate);

// Initial calculation
calculate();
</script>
</body>
</html>
