<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 500px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
.result-card {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  margin-top: 20px;
  text-align: center;
}
.result-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 5px;
}
.result-value {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}
.flex-row {
  display: flex;
  gap: 15px;
}
.flex-item {
  flex: 1;
}
@media (max-width: 768px) {
  .flex-row {
    flex-direction: column !important;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate aspect ratios and simplified ratios.</p>

  <div class="flex-row">
    <div class="flex-item">
      <label for="width">Width</label>
      <input type="number" id="width" value="1920" step="any" />
    </div>
    <div class="flex-item">
      <label for="height">Height</label>
      <input type="number" id="height" value="1080" step="any" />
    </div>
  </div>

  <div class="result-card">
    <div class="result-label">Aspect Ratio (X:1)</div>
    <div id="ratio" class="result-value">1.78:1</div>
  </div>

  <div class="result-card">
    <div class="result-label">Simplified Ratio</div>
    <div id="simplified" class="result-value">16:9</div>
  </div>
</div>
<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioDisplay = document.getElementById('ratio');
const simplifiedDisplay = document.getElementById('simplified');

function gcd(a, b) {
  return b ? gcd(b, a % b) : a;
}

function update() {
  const w = parseFloat(widthInput.value);
  const h = parseFloat(heightInput.value);

  if (isNaN(w) || isNaN(h) || h === 0) {
    ratioDisplay.textContent = '-';
    simplifiedDisplay.textContent = '-';
    return;
  }

  // Calculate X:1 ratio
  const r = (w / h).toFixed(2);
  ratioDisplay.textContent = `${r}:1`;

  // Calculate simplified ratio
  // To handle decimals, we can multiply both by a factor to make them integers
  let sw = w;
  let sh = h;
  const precision = 1000000;
  sw = Math.round(sw * precision);
  sh = Math.round(sh * precision);

  const common = gcd(sw, sh);
  simplifiedDisplay.textContent = `${sw / common}:${sh / common}`;
}

widthInput.addEventListener('input', update);
heightInput.addEventListener('input', update);

// Init
update();
</script>
</body>
</html>
