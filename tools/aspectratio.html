<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
}
.section-title {
  font-size: 14px;
  font-weight: 600;
  margin: 20px 0 10px;
  color: var(--accent);
  border-bottom: 1px solid var(--glass);
  padding-bottom: 5px;
}
.flex-row {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
}
.flex-item {
  flex: 1;
}
.result-box {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  margin-top: 20px;
}
.result-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 5px;
}
.result-value {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
@media (max-width: 480px) {
  .flex-row {
    flex-direction: column;
    gap: 10px;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate dimensions and simplify ratios.</p>

  <div class="section-title">Original Aspect Ratio</div>
  <div class="flex-row">
    <div class="flex-item">
      <label for="w1">Width (W1)</label>
      <input type="number" id="w1" value="1920" />
    </div>
    <div class="flex-item">
      <label for="h1">Height (H1)</label>
      <input type="number" id="h1" value="1080" />
    </div>
  </div>

  <div class="section-title">Target Dimensions</div>
  <div class="flex-row">
    <div class="flex-item">
      <label for="w2">Width (W2)</label>
      <input type="number" id="w2" placeholder="New Width" />
    </div>
    <div class="flex-item">
      <label for="h2">Height (H2)</label>
      <input type="number" id="h2" placeholder="New Height" />
    </div>
  </div>

  <div class="result-box">
    <div class="result-label">Simplified Ratio</div>
    <div id="simplified" class="result-value">16:9</div>
  </div>
</div>

<script>
const w1 = document.getElementById('w1');
const h1 = document.getElementById('h1');
const w2 = document.getElementById('w2');
const h2 = document.getElementById('h2');
const simplified = document.getElementById('simplified');

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function updateSimplified() {
  const width = parseInt(w1.value);
  const height = parseInt(h1.value);
  if (width > 0 && height > 0) {
    const common = gcd(width, height);
    simplified.textContent = `${width / common}:${height / common}`;
  } else {
    simplified.textContent = '-';
  }
}

function calculateH2() {
  const valW1 = parseFloat(w1.value);
  const valH1 = parseFloat(h1.value);
  const valW2 = parseFloat(w2.value);
  if (valW1 > 0 && valH1 > 0 && valW2 > 0) {
    h2.value = Math.round((valW2 * valH1 / valW1) * 100) / 100;
  }
}

function calculateW2() {
  const valW1 = parseFloat(w1.value);
  const valH1 = parseFloat(h1.value);
  const valH2 = parseFloat(h2.value);
  if (valW1 > 0 && valH1 > 0 && valH2 > 0) {
    w2.value = Math.round((valH2 * valW1 / valH1) * 100) / 100;
  }
}

w1.addEventListener('input', () => {
  updateSimplified();
  calculateH2();
});
h1.addEventListener('input', () => {
  updateSimplified();
  calculateH2();
});
w2.addEventListener('input', calculateH2);
h2.addEventListener('input', calculateW2);

// Init
updateSimplified();
</script>
</body>
</html>
