<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input, select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
.flex-row {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
.flex-row > div {
  flex: 1;
}
.result-box {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  text-align: center;
}
.result-box h2 {
  margin: 0;
  font-size: 24px;
  color: var(--accent);
}
.result-box p {
  margin: 5px 0 0;
  font-size: 14px;
  color: var(--muted);
}
@media (max-width: 768px) {
  .flex-row {
    flex-direction: column !important;
  }
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate dimensions and simplified ratios.</p>

  <div class="flex-row">
    <div>
      <label for="width">Width</label>
      <input type="number" id="width" placeholder="1920" />
    </div>
    <div>
      <label for="height">Height</label>
      <input type="number" id="height" placeholder="1080" />
    </div>
  </div>

  <div class="flex-row">
    <div>
      <label for="ratioW">Ratio Width</label>
      <input type="number" id="ratioW" placeholder="16" />
    </div>
    <div>
      <label for="ratioH">Ratio Height</label>
      <input type="number" id="ratioH" placeholder="9" />
    </div>
  </div>

  <div class="result-box">
    <p>Simplified Ratio</p>
    <h2 id="simplifiedRatio">16:9</h2>
  </div>
</div>
<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioWInput = document.getElementById('ratioW');
const ratioHInput = document.getElementById('ratioH');
const simplifiedRatioEl = document.getElementById('simplifiedRatio');

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function updateSimplifiedRatio() {
  const w = parseFloat(widthInput.value);
  const h = parseFloat(heightInput.value);

  if (w > 0 && h > 0) {
    const common = gcd(w, h);
    simplifiedRatioEl.textContent = `${w / common}:${h / common}`;
  } else {
    simplifiedRatioEl.textContent = "-";
  }
}

widthInput.addEventListener('input', () => {
  const w = parseFloat(widthInput.value);
  const rW = parseFloat(ratioWInput.value);
  const rH = parseFloat(ratioHInput.value);

  if (w > 0 && rW > 0 && rH > 0) {
    heightInput.value = (w * rH / rW).toFixed(2);
  }
  updateSimplifiedRatio();
});

heightInput.addEventListener('input', () => {
  const h = parseFloat(heightInput.value);
  const rW = parseFloat(ratioWInput.value);
  const rH = parseFloat(ratioHInput.value);

  if (h > 0 && rW > 0 && rH > 0) {
    widthInput.value = (h * rW / rH).toFixed(2);
  }
  updateSimplifiedRatio();
});

ratioWInput.addEventListener('input', () => {
  const w = parseFloat(widthInput.value);
  const rW = parseFloat(ratioWInput.value);
  const rH = parseFloat(ratioHInput.value);

  if (w > 0 && rW > 0 && rH > 0) {
    heightInput.value = (w * rH / rW).toFixed(2);
  }
  updateSimplifiedRatio();
});

ratioHInput.addEventListener('input', () => {
  const w = parseFloat(widthInput.value);
  const rW = parseFloat(ratioWInput.value);
  const rH = parseFloat(ratioHInput.value);

  if (w > 0 && rW > 0 && rH > 0) {
    heightInput.value = (w * rH / rW).toFixed(2);
  }
  updateSimplifiedRatio();
});

// Set initial values
widthInput.value = 1920;
heightInput.value = 1080;
ratioWInput.value = 16;
ratioHInput.value = 9;
updateSimplifiedRatio();
</script>
</body>
</html>
