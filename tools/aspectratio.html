<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aspect Ratio Calculator</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  margin-bottom: 15px;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}
.result-card {
  background: var(--glass);
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  margin-top: 10px;
}
.result-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 5px;
}
.result-value {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Aspect Ratio Calculator</h1>
  <p class="lead">Calculate width, height or ratio and find the simplified aspect ratio.</p>

  <div class="grid">
    <div>
      <label for="width">Width (W)</label>
      <input type="number" id="width" placeholder="e.g. 1920" />
    </div>
    <div>
      <label for="height">Height (H)</label>
      <input type="number" id="height" placeholder="e.g. 1080" />
    </div>
  </div>

  <div class="grid">
    <div>
      <label for="ratioW">Ratio Width (RW)</label>
      <input type="number" id="ratioW" placeholder="e.g. 16" />
    </div>
    <div>
      <label for="ratioH">Ratio Height (RH)</label>
      <input type="number" id="ratioH" placeholder="e.g. 9" />
    </div>
  </div>

  <div class="result-card">
    <div class="result-label">Simplified Ratio</div>
    <div id="simplifiedRatio" class="result-value">- : -</div>
  </div>
</div>

<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioWInput = document.getElementById('ratioW');
const ratioHInput = document.getElementById('ratioH');
const simplifiedRatioEl = document.getElementById('simplifiedRatio');

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function updateSimplified() {
  const w = parseFloat(widthInput.value);
  const h = parseFloat(heightInput.value);

  if (w > 0 && h > 0) {
    const common = gcd(Math.round(w), Math.round(h));
    simplifiedRatioEl.textContent = `${Math.round(w) / common} : ${Math.round(h) / common}`;
  } else {
    simplifiedRatioEl.textContent = '- : -';
  }
}

widthInput.addEventListener('input', () => {
  const w = parseFloat(widthInput.value);
  const rw = parseFloat(ratioWInput.value);
  const rh = parseFloat(ratioHInput.value);

  if (w > 0 && rw > 0 && rh > 0) {
    heightInput.value = (w * rh / rw).toFixed(2).replace(/\.00$/, '');
  }
  updateSimplified();
});

heightInput.addEventListener('input', () => {
  const h = parseFloat(heightInput.value);
  const rw = parseFloat(ratioWInput.value);
  const rh = parseFloat(ratioHInput.value);

  if (h > 0 && rw > 0 && rh > 0) {
    widthInput.value = (h * rw / rh).toFixed(2).replace(/\.00$/, '');
  }
  updateSimplified();
});

ratioWInput.addEventListener('input', () => {
  const w = parseFloat(widthInput.value);
  const h = parseFloat(heightInput.value);
  const rw = parseFloat(ratioWInput.value);
  const rh = parseFloat(ratioHInput.value);

  if (rw > 0 && rh > 0) {
      if (w > 0) {
          heightInput.value = (w * rh / rw).toFixed(2).replace(/\.00$/, '');
      } else if (h > 0) {
          widthInput.value = (h * rw / rh).toFixed(2).replace(/\.00$/, '');
      }
  }
  updateSimplified();
});

ratioHInput.addEventListener('input', () => {
  const w = parseFloat(widthInput.value);
  const h = parseFloat(heightInput.value);
  const rw = parseFloat(ratioWInput.value);
  const rh = parseFloat(ratioHInput.value);

  if (rw > 0 && rh > 0) {
      if (w > 0) {
          heightInput.value = (w * rh / rw).toFixed(2).replace(/\.00$/, '');
      } else if (h > 0) {
          widthInput.value = (h * rw / rh).toFixed(2).replace(/\.00$/, '');
      }
  }
  updateSimplified();
});
</script>
</body>
</html>
