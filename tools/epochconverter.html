<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Epoch Converter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--muted);
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 14px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
  margin-top: 10px;
}
.result-box {
  margin-top: 20px;
  padding: 15px;
  background: var(--glass);
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.03);
}
.result-item {
  margin-bottom: 10px;
}
.result-item:last-child {
  margin-bottom: 0;
}
.result-label {
  font-size: 12px;
  color: var(--muted);
}
.result-value {
  font-family: monospace;
  font-size: 14px;
  word-break: break-all;
}
</style>
</head>
<body>
<div class="app" role="main">
  <h1>Epoch Converter</h1>
  <p class="lead">Convert Unix timestamps to human-readable dates and vice-versa.</p>

  <div>
    <label for="epochInput">Unix Timestamp (seconds)</label>
    <div style="display:flex; gap:10px;">
      <input type="text" id="epochInput" placeholder="e.g., 1704067200" />
      <button id="toDateBtn">Convert to Date</button>
    </div>
  </div>

  <div style="height:20px"></div>

  <div>
    <label for="dateInput">Human Date</label>
    <div style="display:flex; gap:10px;">
      <input type="text" id="dateInput" placeholder="e.g., 2024-01-01 00:00:00" />
      <button id="toEpochBtn">Convert to Epoch</button>
    </div>
  </div>

  <div id="results" class="result-box" style="display:none;">
    <div class="result-item">
      <div class="result-label">GMT</div>
      <div id="gmtResult" class="result-value"></div>
    </div>
    <div class="result-item">
      <div class="result-label">Local Time</div>
      <div id="localResult" class="result-value"></div>
    </div>
    <div class="result-item">
      <div class="result-label">Timestamp (seconds)</div>
      <div id="epochResult" class="result-value"></div>
    </div>
  </div>

  <button id="nowBtn">Get Current Time</button>
</div>

<script>
const epochInput = document.getElementById('epochInput');
const dateInput = document.getElementById('dateInput');
const toDateBtn = document.getElementById('toDateBtn');
const toEpochBtn = document.getElementById('toEpochBtn');
const nowBtn = document.getElementById('nowBtn');
const results = document.getElementById('results');
const gmtResult = document.getElementById('gmtResult');
const localResult = document.getElementById('localResult');
const epochResult = document.getElementById('epochResult');

function displayResults(date) {
  if (isNaN(date.getTime())) {
    alert('Invalid Date');
    return;
  }
  results.style.display = 'block';
  gmtResult.textContent = date.toUTCString();
  localResult.textContent = date.toString();
  epochResult.textContent = Math.floor(date.getTime() / 1000);
}

toDateBtn.addEventListener('click', () => {
  const ts = parseInt(epochInput.value);
  if (isNaN(ts)) {
    alert('Please enter a valid timestamp');
    return;
  }
  const date = new Date(ts * 1000);
  displayResults(date);
});

toEpochBtn.addEventListener('click', () => {
  const dateStr = dateInput.value;
  // If user provides ISO-like string without Z, treat it as UTC for consistency with ISO output
  const date = new Date(dateStr.includes('T') || dateStr.includes(' ') && !dateStr.includes('GMT') ? dateStr + 'Z' : dateStr);
  displayResults(date);
});

nowBtn.addEventListener('click', () => {
  const now = new Date();
  epochInput.value = Math.floor(now.getTime() / 1000);
  // Using ISO string as default human-readable representation
  dateInput.value = now.toISOString().slice(0, 19).replace('T', ' ');
  displayResults(now);
});

// Set current time on load
nowBtn.click();
</script>
</body>
</html>
