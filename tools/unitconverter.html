<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Unit Converter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  box-sizing: border-box;
  font-size: 14px;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}
</style>
</head>
<body>
<div class="app" role="main">
  <h1>Unit Converter</h1>
  <p class="lead">Convert between common units across different categories.</p>

  <label for="category">Category</label>
  <select id="category">
    <option value="length">Length</option>
    <option value="weight">Weight</option>
    <option value="temperature">Temperature</option>
  </select>

  <div style="height:15px"></div>

  <label for="input">Value</label>
  <input type="number" id="input" placeholder="Enter value" />

  <div style="height:15px"></div>

  <div class="grid">
    <div>
      <label for="fromUnit">From</label>
      <select id="fromUnit"></select>
    </div>
    <div>
      <label for="toUnit">To</label>
      <select id="toUnit"></select>
    </div>
  </div>

  <div style="height:15px"></div>

  <label for="output">Result</label>
  <input type="text" id="output" placeholder="Result" readonly />
</div>
<script>
const categorySelect = document.getElementById('category');
const input = document.getElementById('input');
const fromUnit = document.getElementById('fromUnit');
const toUnit = document.getElementById('toUnit');
const output = document.getElementById('output');

const units = {
  length: {
    cm: { name: 'Centimeters', factor: 1 },
    m: { name: 'Meters', factor: 100 },
    km: { name: 'Kilometers', factor: 100000 },
    inch: { name: 'Inches', factor: 2.54 },
    ft: { name: 'Feet', factor: 30.48 },
    yd: { name: 'Yards', factor: 91.44 },
    mi: { name: 'Miles', factor: 160934.4 }
  },
  weight: {
    g: { name: 'Grams', factor: 1 },
    kg: { name: 'Kilograms', factor: 1000 },
    mg: { name: 'Milligrams', factor: 0.001 },
    lb: { name: 'Pounds', factor: 453.592 },
    oz: { name: 'Ounces', factor: 28.3495 }
  },
  temperature: {
    c: { name: 'Celsius' },
    f: { name: 'Fahrenheit' },
    k: { name: 'Kelvin' }
  }
};

function updateUnits() {
  const category = categorySelect.value;
  const options = Object.keys(units[category]).map(key => `<option value="${key}">${units[category][key].name}</option>`).join('');
  fromUnit.innerHTML = options;
  toUnit.innerHTML = options;

  // Set defaults
  if (category === 'length') {
    fromUnit.value = 'm';
    toUnit.value = 'cm';
  } else if (category === 'weight') {
    fromUnit.value = 'kg';
    toUnit.value = 'g';
  } else if (category === 'temperature') {
    fromUnit.value = 'c';
    toUnit.value = 'f';
  }

  convert();
}

function convert() {
  const category = categorySelect.value;
  const from = fromUnit.value;
  const to = toUnit.value;
  const value = parseFloat(input.value);

  if (isNaN(value)) {
    output.value = '';
    return;
  }

  let result;

  if (category === 'temperature') {
    let celsius;
    if (from === 'c') celsius = value;
    else if (from === 'f') celsius = (value - 32) * 5/9;
    else if (from === 'k') celsius = value - 273.15;

    if (to === 'c') result = celsius;
    else if (to === 'f') result = celsius * 9/5 + 32;
    else if (to === 'k') result = celsius + 273.15;
  } else {
    const fromFactor = units[category][from].factor;
    const toFactor = units[category][to].factor;
    result = (value * fromFactor) / toFactor;
  }

  output.value = result.toLocaleString(undefined, { maximumFractionDigits: 5 });
}

categorySelect.addEventListener('change', updateUnits);
input.addEventListener('input', convert);
fromUnit.addEventListener('change', convert);
toUnit.addEventListener('change', convert);

// Initialize
updateUnits();
</script>
</body>
</html>
