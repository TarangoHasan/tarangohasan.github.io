<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Unit Converter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--muted);
}
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  margin-bottom: 15px;
  box-sizing: border-box;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" style="color:var(--muted); text-decoration:none; font-size:14px; margin-bottom:10px; display:inline-block;">← Back to Home</a>
  <h1>Unit Converter</h1>
  <p class="lead">Convert between common units across different categories.</p>

  <label for="category">Category</label>
  <select id="category">
    <option value="length">Length</option>
    <option value="weight">Weight</option>
    <option value="temperature">Temperature</option>
  </select>

  <label for="input">Value</label>
  <input type="number" id="input" placeholder="Enter value" />

  <div style="display: flex; gap: 10px;">
    <div style="flex: 1;">
      <label for="fromUnit">From</label>
      <select id="fromUnit"></select>
    </div>
    <div style="flex: 1;">
      <label for="toUnit">To</label>
      <select id="toUnit"></select>
    </div>
  </div>

  <label for="output">Result</label>
  <input type="text" id="output" placeholder="Result" readonly />
</div>
<script>
const categorySelect = document.getElementById('category');
const input = document.getElementById('input');
const fromUnit = document.getElementById('fromUnit');
const toUnit = document.getElementById('toUnit');
const output = document.getElementById('output');

const unitData = {
  length: {
    units: {
      cm: { name: 'Centimeters', factor: 1 },
      m: { name: 'Meters', factor: 100 },
      km: { name: 'Kilometers', factor: 100000 },
      inch: { name: 'Inches', factor: 2.54 },
      ft: { name: 'Feet', factor: 30.48 },
      yd: { name: 'Yards', factor: 91.44 },
      mi: { name: 'Miles', factor: 160934.4 }
    },
    base: 'cm'
  },
  weight: {
    units: {
      mg: { name: 'Milligrams', factor: 0.001 },
      g: { name: 'Grams', factor: 1 },
      kg: { name: 'Kilograms', factor: 1000 },
      oz: { name: 'Ounces', factor: 28.3495 },
      lb: { name: 'Pounds', factor: 453.592 }
    },
    base: 'g'
  },
  temperature: {
    units: {
      C: { name: 'Celsius' },
      F: { name: 'Fahrenheit' },
      K: { name: 'Kelvin' }
    }
  }
};

function populateUnits() {
  const category = categorySelect.value;
  const units = unitData[category].units;

  fromUnit.innerHTML = '';
  toUnit.innerHTML = '';

  for (const [key, value] of Object.entries(units)) {
    const opt1 = document.createElement('option');
    opt1.value = key;
    opt1.textContent = value.name;
    fromUnit.appendChild(opt1);

    const opt2 = document.createElement('option');
    opt2.value = key;
    opt2.textContent = value.name;
    toUnit.appendChild(opt2);
  }

  // Set defaults
  if (category === 'length') {
    fromUnit.value = 'm';
    toUnit.value = 'cm';
  } else if (category === 'weight') {
    fromUnit.value = 'kg';
    toUnit.value = 'g';
  } else if (category === 'temperature') {
    fromUnit.value = 'C';
    toUnit.value = 'F';
  }

  convert();
}

function convert() {
  const category = categorySelect.value;
  const from = fromUnit.value;
  const to = toUnit.value;
  const value = parseFloat(input.value);

  if (isNaN(value)) {
    output.value = '';
    return;
  }

  let result;

  if (category === 'temperature') {
    let celsius;
    if (from === 'C') celsius = value;
    else if (from === 'F') celsius = (value - 32) * 5/9;
    else if (from === 'K') celsius = value - 273.15;

    if (to === 'C') result = celsius;
    else if (to === 'F') result = celsius * 9/5 + 32;
    else if (to === 'K') result = celsius + 273.15;
  } else {
    const units = unitData[category].units;
    const valueInBase = value * units[from].factor;
    result = valueInBase / units[to].factor;
  }

  output.value = result.toLocaleString(undefined, { maximumFractionDigits: 5 });
}

categorySelect.addEventListener('change', populateUnits);
input.addEventListener('input', convert);
fromUnit.addEventListener('change', convert);
toUnit.addEventListener('change', convert);

// Initial population
populateUnits();
</script>
</body>
</html>
