<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Unit Converter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input, select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
}
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Unit Converter</h1>
  <p class="lead">Convert between common units.</p>

  <label for="category">Category</label>
  <select id="category">
    <option value="length">Length</option>
    <option value="weight">Weight</option>
    <option value="temperature">Temperature</option>
    <option value="volume">Volume</option>
    <option value="speed">Speed</option>
  </select>
  <div style="height:15px"></div>

  <label for="input">Value</label>
  <input type="number" id="input" placeholder="Enter value" />
  <div style="height:15px"></div>

  <div style="display: flex; gap: 10px;">
    <div style="flex: 1;">
      <label for="fromUnit">From</label>
      <select id="fromUnit"></select>
    </div>
    <div style="flex: 1;">
      <label for="toUnit">To</label>
      <select id="toUnit"></select>
    </div>
  </div>
  <div style="height:15px"></div>

  <label for="output">Result</label>
  <input type="text" id="output" placeholder="Result" readonly />
</div>
<script>
const category = document.getElementById('category');
const input = document.getElementById('input');
const fromUnit = document.getElementById('fromUnit');
const toUnit = document.getElementById('toUnit');
const output = document.getElementById('output');

const units = {
  length: {
    cm: { name: 'Centimeters', factor: 1 },
    m: { name: 'Meters', factor: 100 },
    km: { name: 'Kilometers', factor: 100000 },
    inch: { name: 'Inches', factor: 2.54 },
    ft: { name: 'Feet', factor: 30.48 },
    yd: { name: 'Yards', factor: 91.44 },
    mi: { name: 'Miles', factor: 160934.4 }
  },
  weight: {
    g: { name: 'Grams', factor: 1 },
    kg: { name: 'Kilograms', factor: 1000 },
    oz: { name: 'Ounces', factor: 28.3495 },
    lb: { name: 'Pounds', factor: 453.592 }
  },
  temperature: {
    c: { name: 'Celsius' },
    f: { name: 'Fahrenheit' },
    k: { name: 'Kelvin' }
  },
  volume: {
    ml: { name: 'Milliliters', factor: 1 },
    l: { name: 'Liters', factor: 1000 },
    gal: { name: 'Gallons', factor: 3785.41 },
    m3: { name: 'Cubic Meters', factor: 1000000 }
  },
  speed: {
    'm/s': { name: 'Meters per second', factor: 1 },
    'km/h': { name: 'Kilometers per hour', factor: 0.27778 },
    mph: { name: 'Miles per hour', factor: 0.44704 },
    kn: { name: 'Knots', factor: 0.51444 }
  }
};

function populateUnits() {
  const cat = category.value;
  fromUnit.innerHTML = '';
  toUnit.innerHTML = '';

  Object.keys(units[cat]).forEach(u => {
    const opt1 = document.createElement('option');
    opt1.value = u;
    opt1.textContent = units[cat][u].name;
    fromUnit.appendChild(opt1);

    const opt2 = document.createElement('option');
    opt2.value = u;
    opt2.textContent = units[cat][u].name;
    toUnit.appendChild(opt2);
  });

  if (cat === 'length') {
      toUnit.value = 'm';
  } else if (cat === 'weight') {
      toUnit.value = 'kg';
  } else if (cat === 'temperature') {
      toUnit.value = 'f';
  } else if (cat === 'volume') {
      toUnit.value = 'l';
  } else if (cat === 'speed') {
      toUnit.value = 'km/h';
  }

  convert();
}

function convert() {
  const cat = category.value;
  const from = fromUnit.value;
  const to = toUnit.value;
  const val = parseFloat(input.value);

  if (isNaN(val)) {
    output.value = '';
    return;
  }

  let result;
  if (cat === 'temperature') {
    let celsius;
    if (from === 'c') celsius = val;
    else if (from === 'f') celsius = (val - 32) * 5/9;
    else if (from === 'k') celsius = val - 273.15;

    if (to === 'c') result = celsius;
    else if (to === 'f') result = (celsius * 9/5) + 32;
    else if (to === 'k') result = celsius + 273.15;
  } else {
    const baseValue = val * units[cat][from].factor;
    result = baseValue / units[cat][to].factor;
  }

  output.value = result.toLocaleString(undefined, { maximumFractionDigits: 5 });
}

category.addEventListener('change', populateUnits);
input.addEventListener('input', convert);
fromUnit.addEventListener('change', convert);
toUnit.addEventListener('change', convert);

// Init
populateUnits();
</script>
</body>
</html>
