<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Unit Converter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 600px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
input, select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
}
.back-link { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="app" role="main">
  <a href="../index.html" class="back-link">← Back to Home</a>
  <h1>Unit Converter</h1>
  <p class="lead">Convert between common units.</p>
  <input type="number" id="input" placeholder="Enter value" />
  <div style="height:10px"></div>
  <select id="fromUnit">
    <option value="cm">Centimeters</option>
    <option value="m">Meters</option>
    <option value="km">Kilometers</option>
    <option value="inch">Inches</option>
    <option value="ft">Feet</option>
    <option value="yd">Yards</option>
    <option value="mi">Miles</option>
  </select>
  <div style="height:10px"></div>
  <select id="toUnit">
    <option value="cm">Centimeters</option>
    <option value="m">Meters</option>
    <option value="km">Kilometers</option>
    <option value="inch">Inches</option>
    <option value="ft">Feet</option>
    <option value="yd">Yards</option>
    <option value="mi">Miles</option>
  </select>
  <div style="height:10px"></div>
  <input type="text" id="output" placeholder="Result" readonly />
</div>
<script>
const input = document.getElementById('input');
const fromUnit = document.getElementById('fromUnit');
const toUnit = document.getElementById('toUnit');
const output = document.getElementById('output');

const factors = {
  cm: 1,
  m: 100,
  km: 100000,
  inch: 2.54,
  ft: 30.48,
  yd: 91.44,
  mi: 160934.4
};

function convert() {
  const from = fromUnit.value;
  const to = toUnit.value;
  const value = parseFloat(input.value);

  if (isNaN(value)) {
    output.value = '';
    return;
  }

  const valueInCm = value * factors[from];
  const result = valueInCm / factors[to];

  output.value = result.toLocaleString(undefined, { maximumFractionDigits: 5 });
}

input.addEventListener('input', convert);
fromUnit.addEventListener('change', convert);
toUnit.addEventListener('change', convert);
</script>
</body>
</html>
