<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CSS Minifier</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 800px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
textarea {
  width: 100%;
  min-height: 150px;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  resize: vertical;
  font-family: monospace;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 14px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="app" role="main">
  <h1>CSS Minifier</h1>
  <p class="lead">Minify your CSS by removing comments and whitespace.</p>
  <textarea id="input" placeholder="Paste CSS here..."></textarea>
  <div style="height:10px"></div>
  <button id="minifyBtn">Minify CSS</button>
  <div style="height:10px"></div>
  <textarea id="output" placeholder="Minified CSS..." readonly></textarea>
  <div style="height:10px"></div>
  <button id="copyBtn">Copy Minified CSS</button>
</div>
<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const minifyBtn = document.getElementById('minifyBtn');
const copyBtn = document.getElementById('copyBtn');

minifyBtn.addEventListener('click', () => {
  let css = input.value;
  // Remove comments
  css = css.replace(/\/\*[\s\S]*?\*\//g, '');
  // Remove whitespace
  css = css.replace(/\s+/g, ' ');
  css = css.replace(/\s*([{};:])\s*/g, '$1');
  css = css.trim();
  output.value = css;
});

copyBtn.addEventListener('click', () => {
  if (output.value) {
    navigator.clipboard.writeText(output.value);
    const originalText = copyBtn.textContent;
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = originalText, 2000);
  }
});
</script>
</body>
</html>
