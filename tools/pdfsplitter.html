
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PDF Page Splitter</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 1200px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
  display: flex;
  gap: 20px;
}
.sidebar {
  width: 300px;
}
.main-content {
  flex: 1;
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--muted);
}
input, textarea {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
}
textarea {
  min-height: 72px;
  resize: vertical;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 14px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
}
.pdf-viewer {
  border: 1px solid var(--glass);
  border-radius: 8px;
  overflow: hidden;
}
#pdf-canvas {
  width: 100%;
  height: auto;
}
.page-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}
.list {
  margin-top: 14px;
  border-radius: 8px;
  padding: 12px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.005));
  border: 1px solid rgba(255, 255, 255, 0.02);
}
.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 6px;
  border-bottom: 1px dashed rgba(255, 255, 255, 0.02);
}
  .back-link {
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.min.js"></script>
</head>
<body>
<div class="app" role="main">
  <div class="sidebar">
    <a href="../index.html" class="back-link">← Back to Home</a>
    <h1>PDF Page Splitter</h1>
    <p class="lead">Select a PDF, choose ranges, and split.</p>
    <label for="file">Choose PDF</label>
    <input id="file" type="file" accept="application/pdf" />
    <div style="height:10px"></div>
    <label for="ranges">Page ranges</label>
    <textarea id="ranges" placeholder="e.g., 1-5, 8, 10-12"></textarea>
    <div style="height:10px"></div>
    <button id="splitBtn">Split PDF</button>
    <div id="progress" class="muted"></div>
    <div id="errors" style="margin-top:8px"></div>
  </div>
  <div class="main-content">
    <div class="pdf-viewer">
      <canvas id="pdf-canvas"></canvas>
    </div>
    <div class="page-nav">
      <button id="prev-page">Prev</button>
      <span id="page-num"></span>
      <button id="next-page">Next</button>
    </div>
    <div id="results" class="list"></div>
  </div>
</div>
<script>
const { PDFDocument } = PDFLib;
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.worker.min.js';

const fileInput = document.getElementById('file');
const rangesInput = document.getElementById('ranges');
const splitBtn = document.getElementById('splitBtn');
const results = document.getElementById('results');
const errors = document.getElementById('errors');
const progress = document.getElementById('progress');

const pdfCanvas = document.getElementById('pdf-canvas');
const pageNum = document.getElementById('page-num');
const prevPageBtn = document.getElementById('prev-page');
const nextPageBtn = document.getElementById('next-page');

let pdfDoc = null;
let currentPage = 1;

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  progress.textContent = 'Loading PDF...';
  const fileReader = new FileReader();
  fileReader.onload = async (event) => {
    const typedarray = new Uint8Array(event.target.result);
    pdfDoc = await pdfjsLib.getDocument({ data: typedarray }).promise;
    progress.textContent = '';
    renderPage(currentPage);
  };
  fileReader.readAsArrayBuffer(file);
});

async function renderPage(num) {
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: 1.5 });
  const context = pdfCanvas.getContext('2d');
  pdfCanvas.height = viewport.height;
  pdfCanvas.width = viewport.width;
  await page.render({ canvasContext: context, viewport }).promise;
  pageNum.textContent = `Page ${num} of ${pdfDoc.numPages}`;
}

prevPageBtn.addEventListener('click', () => {
  if (currentPage > 1) {
    currentPage--;
    renderPage(currentPage);
  }
});

nextPageBtn.addEventListener('click', () => {
  if (currentPage < pdfDoc.numPages) {
    currentPage++;
    renderPage(currentPage);
  }
});

function parseRanges(text) {
  const ranges = [];
  const parts = text.split(',');
  for (const part of parts) {
    if (part.includes('-')) {
      const [start, end] = part.split('-').map(Number);
      ranges.push({ start, end });
    } else {
      const num = Number(part);
      ranges.push({ start: num, end: num });
    }
  }
  return ranges;
}

splitBtn.addEventListener('click', async () => {
  if (!pdfDoc) {
    errors.textContent = 'Please select a PDF file.';
    return;
  }
  const ranges = parseRanges(rangesInput.value);
  if (ranges.length === 0) {
    errors.textContent = 'Please enter valid page ranges.';
    return;
  }

  progress.textContent = 'Splitting PDF...';
  const file = fileInput.files[0];
  const pdfBytes = await file.arrayBuffer();
  const srcPdf = await PDFDocument.load(pdfBytes);

  results.innerHTML = '';
  for (const range of ranges) {
    const newPdf = await PDFDocument.create();
    const pages = await newPdf.copyPages(srcPdf, Array.from({ length: range.end - range.start + 1 }, (_, i) => range.start - 1 + i));
    pages.forEach(page => newPdf.addPage(page));
    const pdfBytes = await newPdf.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);

    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `<span>${range.start}-${range.end}.pdf</span><a href="${url}" download="${range.start}-${range.end}.pdf">Download</a>`;
    results.appendChild(item);
  }
  progress.textContent = 'Done!';
});
</script>
</body>
</html>
