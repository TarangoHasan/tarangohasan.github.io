<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Base64 Encoder/Decoder</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #9aa8b2;
  --glass: rgba(255, 255, 255, 0.03);
}
html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg, #041025 0%, #0b1730 100%);
  color: #e6eef6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.app {
  width: 800px;
  max-width: 96%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}
h1 {
  margin: 0;
  font-size: 20px;
}
p.lead {
  margin: 6px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
textarea {
  width: 100%;
  min-height: 100px;
  padding: 8px;
  border-radius: 8px;
  background: var(--glass);
  border: 1px solid rgba(255, 255, 255, 0.03);
  color: inherit;
  resize: vertical;
}
button {
  background: linear-gradient(90deg, var(--accent), #3b82f6);
  border: 0;
  padding: 10px 14px;
  font-weight: 600;
  border-radius: 8px;
  color: #042027;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="app" role="main">
  <h1>Base64 Encoder/Decoder</h1>
  <p class="lead">Encode text to Base64 or decode from Base64.</p>
  <textarea id="input" placeholder="Enter text here..."></textarea>
  <div style="height:10px"></div>
  <button id="encodeBtn">Encode</button>
  <button id="decodeBtn">Decode</button>
  <div style="height:10px"></div>
  <textarea id="output" placeholder="Result..."></textarea>
</div>
<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const encodeBtn = document.getElementById('encodeBtn');
const decodeBtn = document.getElementById('decodeBtn');

encodeBtn.addEventListener('click', () => {
  try {
    output.value = btoa(input.value);
  } catch (e) {
    output.value = 'Error: ' + e.message;
  }
});

decodeBtn.addEventListener('click', () => {
  try {
    output.value = atob(input.value);
  } catch (e) {
    output.value = 'Error: ' + e.message;
  }
});
</script>
</body>
</html>
